<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blogs | Om Burande</title>
    <link rel="stylesheet" href="/css/blogs.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark Overlay for better text readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        .blog-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
            position: relative;
            z-index: 1;
        }

        /* Back to Home Button */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(255, 122, 0, 0.15);
            border: 1px solid rgba(255, 122, 0, 0.4);
            color: #ff7a00;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            font-size: 14px;
        }

        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(255, 122, 0, 0.4);
        }

        /* Header - Reduced spacing */
        .blog-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .blog-header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ffffff, #ffaa66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 122, 0, 0.3);
        }

        .blog-header p {
            color: #e0e0e0;
            font-size: 16px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Filter Bar - Reduced top margin */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(18, 25, 43, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 122, 0, 0.4);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #ff7a00;
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .tag-filter {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 122, 0, 0.4);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            min-width: 150px;
            transition: all 0.3s ease;
        }

        .tag-filter:focus {
            border-color: #ff7a00;
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.3);
        }

        .tag-filter option {
            background: #1a1a2e;
            color: white;
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 122, 0, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .blog-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ff7a00;
            box-shadow: 0 25px 40px rgba(255, 122, 0, 0.3);
        }

        .blog-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .blog-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .blog-card:hover .blog-image img {
            transform: scale(1.15);
        }

        .blog-content {
            padding: 20px;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .blog-date {
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .blog-date::before {
            content: '📅';
            margin-right: 4px;
        }

        .blog-read-time {
            background: rgba(255, 122, 0, 0.2);
            color: #ffaa66;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 122, 0, 0.3);
        }

        .blog-title {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .blog-description {
            color: #d0d0d0;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .blog-tag {
            background: rgba(255, 122, 0, 0.15);
            color: #ffaa66;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            backdrop-filter: blur(4px);
        }

        .read-more {
            color: #ffaa66;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            padding: 5px 0;
            font-size: 14px;
        }

        .read-more:hover {
            gap: 12px;
            color: #ff7a00;
            text-shadow: 0 0 10px rgba(255, 122, 0, 0.5);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #ffaa66;
            font-size: 18px;
            grid-column: 1 / -1;
            background: rgba(18, 25, 43, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 122, 0, 0.2);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid rgba(255, 122, 0, 0.3);
            border-top-color: #ff7a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 122, 0, 0.2);
            grid-column: 1 / -1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 122, 0, 0.3));
        }

        .empty-state h3 {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #d0d0d0;
            margin-bottom: 20px;
        }

        .empty-state .back-home-btn {
            display: inline-block;
            margin: 0;
        }

        /* ===== RESPONSIVE STYLES (ADDED ONLY - NO ORIGINAL CODE MODIFIED) ===== */
        @media (max-width: 1024px) {
            .blog-section {
                padding: 20px 20px 40px;
            }
            
            .blog-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 22px;
            }
        }

        @media (max-width: 768px) {
            .blog-section {
                padding: 15px 15px 30px;
            }
            
            .back-home-btn {
                padding: 6px 14px;
                font-size: 12px;
                margin-bottom: 15px;
            }
            
            .blog-header h1 {
                font-size: 32px;
            }
            
            .blog-header p {
                font-size: 14px;
            }
            
            .blog-header {
                margin-bottom: 15px;
            }
            
            .filter-bar {
                flex-direction: column;
                border-radius: 20px;
                padding: 15px;
                gap: 12px;
                margin-bottom: 25px;
            }
            
            .search-box, .tag-filter {
                width: 100%;
                min-width: auto;
                padding: 10px 16px;
            }
            
            .blog-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .blog-image {
                height: 180px;
            }
            
            .blog-content {
                padding: 16px;
            }
            
            .blog-title {
                font-size: 18px;
            }
            
            .blog-description {
                font-size: 13px;
                line-height: 1.5;
            }
            
            .blog-meta {
                font-size: 11px;
                margin-bottom: 10px;
            }
            
            .blog-date, .blog-read-time {
                font-size: 11px;
                padding: 3px 8px;
            }
            
            .blog-tag {
                font-size: 10px;
                padding: 2px 8px;
            }
            
            .read-more {
                font-size: 13px;
            }
            
            .loading {
                padding: 30px;
                font-size: 16px;
            }
            
            .empty-state {
                padding: 40px 15px;
            }
            
            .empty-state-icon {
                font-size: 50px;
            }
            
            .empty-state h3 {
                font-size: 20px;
            }
            
            .empty-state p {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .blog-section {
                padding: 12px 12px 25px;
            }
            
            .back-home-btn {
                padding: 5px 12px;
                font-size: 11px;
                margin-bottom: 12px;
            }
            
            .blog-header h1 {
                font-size: 26px;
            }
            
            .blog-header p {
                font-size: 12px;
            }
            
            .filter-bar {
                padding: 12px;
                gap: 10px;
                margin-bottom: 20px;
            }
            
            .search-box, .tag-filter {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .blog-image {
                height: 160px;
            }
            
            .blog-content {
                padding: 14px;
            }
            
            .blog-title {
                font-size: 16px;
                margin-bottom: 8px;
            }
            
            .blog-description {
                font-size: 12px;
                margin-bottom: 12px;
            }
            
            .blog-meta {
                margin-bottom: 8px;
            }
            
            .blog-date, .blog-read-time {
                font-size: 10px;
                padding: 2px 6px;
            }
            
            .blog-tags {
                gap: 5px;
                margin-bottom: 12px;
            }
            
            .blog-tag {
                font-size: 9px;
                padding: 2px 6px;
            }
            
            .read-more {
                font-size: 12px;
            }
            
            .loading {
                padding: 25px;
                font-size: 14px;
            }
            
            .empty-state {
                padding: 30px 12px;
            }
            
            .empty-state-icon {
                font-size: 40px;
                margin-bottom: 10px;
            }
            
            .empty-state h3 {
                font-size: 18px;
            }
            
            .empty-state p {
                font-size: 12px;
                margin-bottom: 15px;
            }
        }

        /* Tablet landscape optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 22px;
            }
        }

        /* Small height devices */
        @media (max-height: 600px) {
            .blog-section {
                padding: 15px 20px 30px;
            }
            
            .blog-header {
                margin-bottom: 12px;
            }
            
            .blog-header h1 {
                font-size: 32px;
            }
            
            .filter-bar {
                margin-bottom: 20px;
            }
        }

        /* Very small screens */
        @media (max-width: 360px) {
            .blog-title {
                font-size: 15px;
            }
            
            .blog-description {
                font-size: 11px;
            }
            
            .blog-content {
                padding: 12px;
            }
            
            .blog-image {
                height: 140px;
            }
        }

        /* Ensure smooth transitions */
        .blog-card, .back-home-btn, .read-more, .search-box, .tag-filter {
            transition: all 0.3s ease;
        }

        /* Fix for video background on mobile */
        @media (max-width: 768px) {
            .video-background {
                object-position: center;
            }
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop playsinline class="video-background">
        <source src="/assets/videos/vd.mp4" type="video/mp4">
        <source src="/assets/videos/dashboard-animation.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <section class="blog-section">
        <a href="/index.html" class="back-home-btn">← Back to Home</a>

        <div class="blog-header">
            <h1>Blogs & Articles</h1>
            <p>Thoughts, tutorials, and insights on tech</p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search blogs...">
            <select id="tagFilter" class="tag-filter">
                <option value="">All Topics</option>
                <option value="AI">🤖 AI</option>
                <option value="MongoDB">🍃 MongoDB</option>
                <option value="JavaScript">🟨 JavaScript</option>
                <option value="React">⚛️ React</option>
                <option value="Node.js">🟢 Node.js</option>
                <option value="Python">🐍 Python</option>
                <option value="Java">☕ Java</option>
            </select>
        </div>

        <!-- Blog Grid -->
        <div id="blogGrid" class="blog-grid">
            <!-- Populated by JavaScript -->
        </div>
    </section>
    <script src="/js/config.js"></script>
    <script>
        const API_BASE = `${BASE_URL}/api`;
        let allBlogs = [];

        async function loadBlogs() {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '<div class="loading">Loading blogs...</div>';

            try {
                const response = await fetch(`${API_BASE}/blogs/all`);
                if (!response.ok) throw new Error('Failed to fetch');
                
                allBlogs = await response.json();
                displayBlogs(allBlogs);
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>No Blogs Yet</h3>
                        <p>Check back later for new articles</p>
                        <a href="/client/index.html" class="back-home-btn">← Back to Home</a>
                    </div>
                `;
            }
        }

        function displayBlogs(blogs) {
            const grid = document.getElementById('blogGrid');
            
            if (blogs.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3>No Blogs Found</h3>
                        <p>Try a different search term or tag</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = blogs.map(blog => {
                const tags = Array.isArray(blog.tags) ? blog.tags : [];
                
                return `
                    <div class="blog-card" onclick="viewBlog('${blog.slug || blog._id}')">
                        <div class="blog-image">
                            <img src="${blog.coverImage || 'https://via.placeholder.com/400x200?text=Blog+Image'}" 
                                 alt="${blog.title}" 
                                 onerror="this.src='https://via.placeholder.com/400x200?text=Blog+Image'">
                        </div>
                        <div class="blog-content">
                            <div class="blog-meta">
                                <span class="blog-date">${blog.date || 'No date'}</span>
                                <span class="blog-read-time">⏱️ ${blog.readTime || '5 min'}</span>
                            </div>
                            <h3 class="blog-title">${blog.title}</h3>
                            <p class="blog-description">${blog.shortDescription || ''}</p>
                            <div class="blog-tags">
                                ${tags.map(tag => `<span class="blog-tag">#${tag}</span>`).join('')}
                            </div>
                            <span class="read-more">Read Article →</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewBlog(identifier) {
            window.location.href = `blog-detail.html?id=${identifier}`;
        }

        // Search and filter functionality
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedTag = document.getElementById('tagFilter').value;
            
            let filtered = [...allBlogs];
            
            if (searchTerm) {
                filtered = filtered.filter(blog => 
                    blog.title.toLowerCase().includes(searchTerm) || 
                    (blog.shortDescription && blog.shortDescription.toLowerCase().includes(searchTerm))
                );
            }
            
            if (selectedTag) {
                filtered = filtered.filter(blog => 
                    Array.isArray(blog.tags) && blog.tags.includes(selectedTag)
                );
            }
            
            displayBlogs(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('tagFilter').addEventListener('change', applyFilters);

        // Initialize
        document.addEventListener('DOMContentLoaded', loadBlogs);
    </script>
</body>
</html>
