<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="/css/achievements.css">
    <style>
        /* ===== ADDITIONAL RESPONSIVE STYLES (NO ORIGINAL CODE MODIFIED) ===== */
        /* These styles only enhance responsiveness - all original JS/API untouched */
        
        /* Ensure container is responsive */
        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        
        /* Make cards layout responsive */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        
        /* Card styling - preserve original but add responsive width */
        .card {
            background: rgba(15, 25, 35, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 122, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
            flex: 1;
            min-width: 280px;
            max-width: 100%;
        }
        
        /* Thumbnail track improvements for mobile */
        .thumbnail-slider {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 15px 0;
            border-radius: 12px;
        }
        
        .thumb-track {
            display: flex;
            flex-direction: row;
            gap: 16px;
            padding: 8px 4px 12px 4px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Thumbnail sizing - proper fit for all devices */
        .thumb {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid rgba(255, 122, 0, 0.3);
            transition: all 0.25s ease;
            scroll-snap-align: start;
            flex-shrink: 0;
            background: #1a1f2e;
        }
        
        .thumb.active {
            border-color: #ff7a00;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.3);
        }
        
        /* PDF and no-file thumbnails */
        .thumb.pdf-thumb, .thumb.no-file {
            width: 100px;
            height: 100px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e2a3a, #0f1722);
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid rgba(255, 122, 0, 0.3);
            flex-shrink: 0;
        }
        
        .thumb.pdf-thumb.active, .thumb.no-file.active {
            border-color: #ff7a00;
            background: linear-gradient(135deg, #2a3a4a, #1a2535);
        }
        
        /* Hide scrollbar for cleaner look on mobile (optional) */
        .thumb-track::-webkit-scrollbar {
            height: 4px;
        }
        
        .thumb-track::-webkit-scrollbar-track {
            background: rgba(255, 122, 0, 0.1);
            border-radius: 10px;
        }
        
        .thumb-track::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 10px;
        }
        
        /* Card footer responsive */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .view-btn {
            background: rgba(255, 122, 0, 0.15);
            border: 1px solid rgba(255, 122, 0, 0.4);
            color: #ff9f4a;
            padding: 8px 22px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .view-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateY(-2px);
        }
        
        .accent-line {
            height: 3px;
            width: 60px;
            background: linear-gradient(90deg, #ff7a00, #ffb347);
            border-radius: 3px;
        }
        
        /* Title and subtitle responsive */
        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff9f4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #aab4d4;
            margin-bottom: 40px;
            border-left: 3px solid #ff7a00;
            padding-left: 18px;
        }
        
        /* ===== RESPONSIVE BREAKPOINTS ===== */
        
        /* Tablet and smaller laptops */
        @media (max-width: 1024px) {
            .container {
                padding: 0 24px;
            }
            .cards {
                gap: 24px;
            }
            .card {
                padding: 22px;
            }
            .title {
                font-size: 2.2rem;
            }
            .thumb {
                width: 90px;
                height: 90px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 90px;
                height: 90px;
            }
        }
        
        /* Mobile landscape and tablets */
        @media (max-width: 768px) {
            .container {
                padding: 0 18px;
            }
            
            .back-home-btn {
                padding: 8px 16px;
                font-size: 12px;
                margin-bottom: 20px;
            }
            
            .title {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 28px;
                padding-left: 14px;
            }
            
            .cards {
                flex-direction: column;
                gap: 24px;
            }
            
            .card {
                width: 100%;
                padding: 20px;
                min-width: auto;
            }
            
            .card h2 {
                font-size: 1.4rem;
                margin-bottom: 16px;
            }
            
            /* Thumbnails - properly fitted for mobile */
            .thumb {
                width: 85px;
                height: 85px;
                border-radius: 12px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 85px;
                height: 85px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 36px !important;
            }
            
            .thumb-track {
                gap: 14px;
                padding-bottom: 10px;
            }
            
            .card-footer {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            
            .view-btn {
                padding: 7px 18px;
                font-size: 13px;
            }
            
            .accent-line {
                width: 50px;
            }
            
            /* Modal responsive */
            .modal-content {
                width: 90%;
                max-width: 90%;
                padding: 20px;
                margin: 20px;
            }
            
            .modal-content h2 {
                font-size: 1.3rem;
            }
            
            #modal-image {
                max-height: 180px;
            }
            
            .close-btn {
                top: 12px;
                right: 16px;
                font-size: 26px;
            }
        }
        
        /* Small mobile devices */
        @media (max-width: 550px) {
            .container {
                padding: 0 14px;
            }
            
            .back-home-btn {
                padding: 6px 14px;
                font-size: 11px;
                gap: 6px;
            }
            
            .title {
                font-size: 1.6rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 24px;
            }
            
            .card {
                padding: 16px;
            }
            
            .card h2 {
                font-size: 1.25rem;
                margin-bottom: 14px;
            }
            
            /* Larger thumbnails for better visibility on small screens */
            .thumb {
                width: 75px;
                height: 75px;
                border-radius: 10px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 75px;
                height: 75px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 32px !important;
            }
            
            .thumb-track {
                gap: 12px;
            }
            
            .view-btn {
                padding: 6px 16px;
                font-size: 12px;
            }
            
            .accent-line {
                width: 45px;
            }
            
            .modal-content {
                padding: 18px;
            }
            
            .modal-content h2 {
                font-size: 1.2rem;
            }
            
            .modal-content p {
                font-size: 0.75rem;
            }
            
            #modal-image {
                max-height: 150px;
            }
            
            .close-btn {
                top: 10px;
                right: 12px;
                font-size: 22px;
            }
            
            .no-items {
                padding: 12px;
                font-size: 12px;
            }
        }
        
        /* Extra small devices */
        @media (max-width: 400px) {
            .thumb {
                width: 70px;
                height: 70px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 70px;
                height: 70px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 28px !important;
            }
            
            .thumb-track {
                gap: 10px;
            }
            
            .card h2 {
                font-size: 1.15rem;
            }
            
            .view-btn {
                padding: 5px 14px;
                font-size: 11px;
            }
        }
        
        /* Very small devices (below 360px) */
        @media (max-width: 360px) {
            .title {
                font-size: 1.4rem;
            }
            
            .subtitle {
                font-size: 0.75rem;
            }
            
            .thumb {
                width: 65px;
                height: 65px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 65px;
                height: 65px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 26px !important;
            }
            
            .card {
                padding: 14px;
            }
            
            .card h2 {
                font-size: 1.1rem;
            }
        }
        
        /* Tablet landscape optimization */
        @media (min-width: 769px) and (max-width: 1024px) and (orientation: landscape) {
            .cards {
                gap: 20px;
            }
            
            .card {
                padding: 20px;
            }
            
            .thumb {
                width: 85px;
                height: 85px;
            }
        }
        
        /* Desktop large screens */
        @media (min-width: 1400px) {
            .container {
                max-width: 1400px;
                padding: 0 40px;
            }
            
            .thumb {
                width: 120px;
                height: 120px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 120px;
                height: 120px;
            }
            
            .cards {
                gap: 35px;
            }
            
            .card {
                padding: 30px;
            }
            
            .title {
                font-size: 3rem;
            }
        }
        
        /* Ensure no overflow issues */
        body {
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a0f1c 0%, #0c1222 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
        }
        
        .achievements {
            padding: 60px 0 80px;
            min-height: 100vh;
        }
        
        /* Card hover effect */
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 122, 0, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        /* Make sure images scale properly */
        img.thumb {
            object-fit: cover;
        }
        
        /* Smooth transitions */
        .thumb, .view-btn, .back-home-btn, .card {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
    </style>
</head>
<body>

<section class="achievements">
    <div class="container">
            <a href="index.html" class="back-home-btn">← Back to Home</a>
        <h1 class="title">Achievements & Recognition</h1>
        <p class="subtitle">Certificates • Hackathons • Awards</p>

        <div class="cards" id="achievementsContainer">
            <!-- Cards will be dynamically populated here -->
        </div>
    </div>
</section>
<script src="/js/config.js"></script>
<script>
// ===== ORIGINAL JAVASCRIPT - COMPLETELY UNMODIFIED =====
const API_BASE = `${BASE_URL}/api`;

async function loadAchievements() {
    try {
        const response = await fetch(`${API_BASE}/achievements/all`);
        const achievements = await response.json();

        // Group achievements by category
        const industry = achievements.filter(a => a.category === 'industry');
        const competitive = achievements.filter(a => a.category === 'competitive');
        const milestones = achievements.filter(a => a.category === 'milestone');

        const container = document.getElementById('achievementsContainer');
        
        container.innerHTML = `
            <!-- Industry Credentials Card -->
            <div class="card">
                <h2>Industry Credentials</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="industry-thumbnails">
                        ${generateThumbnails(industry)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('industry')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- Competitive Highlights Card -->
            <div class="card">
                <h2>Competitive Highlights</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="competitive-thumbnails">
                        ${generateThumbnails(competitive)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('competitive')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- Milestones Card -->
            <div class="card">
                <h2>Milestones</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="milestones-thumbnails">
                        ${generateThumbnails(milestones)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('milestone')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>
        `;

        // Initialize thumbnail click handlers
        initializeThumbnails();

    } catch (error) {
        console.error('Error loading achievements:', error);
        showFallbackContent();
    }
}

function generateThumbnails(items) {
    if (items.length === 0) {
        return `<div class="no-items">No achievements yet</div>`;
    }
    
    return items.map((item, index) => {
        const isActive = index === 0 ? 'active' : '';
        
        if (item.fileType === 'image' && item.fileUrl) {
            // Image thumbnail
            return `<img src="${BASE_URL}${item.fileUrl}" 
                         class="thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">`;
        } else if (item.fileType === 'pdf' && item.fileUrl) {
            // PDF thumbnail (icon)
            return `<div class="thumb pdf-thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">
                        <span style="font-size: 40px;">📄</span>
                        <span style="font-size: 12px; display: block;">PDF</span>
                    </div>`;
        } else {
            // No file thumbnail (text icon)
            return `<div class="thumb no-file ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         onclick="showAchievementDetails(this)">
                        <span style="font-size: 40px;">📝</span>
                    </div>`;
        }
    }).join('');
}

function initializeThumbnails() {
    document.querySelectorAll('.thumb-track').forEach(track => {
        const thumbs = track.querySelectorAll('.thumb');
        if (thumbs.length > 0) {
            thumbs[0].classList.add('active');
        }
    });
}

function showAchievementDetails(thumbnail) {
    const track = thumbnail.closest('.thumb-track');
    track.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    thumbnail.classList.add('active');
    
    console.log('Selected:', {
        title: thumbnail.dataset.title,
        description: thumbnail.dataset.description,
        issuer: thumbnail.dataset.issuer,
        date: thumbnail.dataset.date
    });
    
    // Optional: Open modal with details
    // openAchievementModal(thumbnail.dataset);
}

function viewAll(category) {
    const pages = {
        'industry': 'certificates.html',
        'competitive': 'hackathons.html',
        'milestone': 'milestones.html'
    };
    window.location.href = pages[category];
}

function showFallbackContent() {
    const container = document.getElementById('achievementsContainer');
    container.innerHTML = `
        <div class="card">
            <h2>Industry Credentials</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secone-1.png" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secone-2.png" class="thumb">
                    <img src="/assets/images/ach-thumnails/secone-3.png" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
        <div class="card">
            <h2>Competitive Highlights</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/sectwo-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/sectwo-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/sectwo-4.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
        <div class="card">
            <h2>Milestones</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secthree-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secthree-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/secthree-3.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
    `;
}

// Load achievements when page loads
document.addEventListener('DOMContentLoaded', loadAchievements);

// Modal functions (optional)
function createDetailModal() {
    const modal = document.createElement('div');
    modal.className = 'achievement-modal';
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Achievement">
            <h2 id="modal-title"></h2>
            <p id="modal-issuer"></p>
            <p id="modal-date"></p>
            <p id="modal-description"></p>
            <a id="modal-link" href="#" target="_blank">View Certificate</a>
        </div>
    `;
    document.body.appendChild(modal);
}

function openModal(achievementData) {
    const modal = document.querySelector('.achievement-modal') || createDetailModal();
    
    document.getElementById('modal-image').src = achievementData.fileUrl ? `${BASE_URL}${achievementData.fileUrl}` : '';
    document.getElementById('modal-title').textContent = achievementData.title;
    document.getElementById('modal-issuer').textContent = achievementData.issuer;
    document.getElementById('modal-date').textContent = achievementData.date;
    document.getElementById('modal-description').textContent = achievementData.description;
    
    const link = document.getElementById('modal-link');
    if (achievementData.link) {
        link.href = achievementData.link;
        link.style.display = 'inline-block';
    } else {
        link.style.display = 'none';
    }
    
    modal.style.display = 'flex';
}

function closeModal() {
    const modal = document.querySelector('.achievement-modal');
    if (modal) modal.style.display = 'none';
}
</script>

<style>

    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 122, 0, 0.1);

    color: #ff7a00;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 500;

    backdrop-filter: blur(5px);
}

}

    display: none;

}

    scroll-behavior: smooth;
}

    overflow: hidden;
}

    background: rgba(255, 122, 0, 0.2);

    border-radius: 30px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.view-btn:hover {
    background: #ff7a00;
    color: #0a0f1c;
}

.accent-line {
    height: 2px;
    background: linear-gradient(90deg, #ff7a00, #ffb347);
}
</style>

</body>
