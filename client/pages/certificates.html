<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Industry Certifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 0, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 107, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .page-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.3);
            color: #ff6b00;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #ff6b00;
            color: #0a0a0a;
            transform: translateX(-3px);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 16px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .subtitle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: #ff6b00;
        }

        /* Certificate Grid */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .cert-card {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            height: fit-content;
        }

        .cert-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b00;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .cert-image {
            height: 180px;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cert-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .cert-card:hover .cert-image img {
            transform: scale(1.05);
        }

        .cert-image .pdf-icon {
            font-size: 50px;
            color: #ff6b00;
        }

        .cert-content {
            padding: 15px;
        }

        .cert-category {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-radius: 15px;
            font-size: 11px;
            color: #ff6b00;
            margin-bottom: 10px;
        }

        .cert-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .cert-date {
            color: #b0b0b0;
            font-size: 13px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cert-date::before {
            content: '📅';
            font-size: 12px;
        }

        .cert-description {
            color: #a0a0a0;
            line-height: 1.5;
            font-size: 13px;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .cert-footer {
            display: flex;
            justify-content: flex-end;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 107, 0, 0.2);
        }

        .view-btn {
            color: #ff6b00;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #ff6b00;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 8px;
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 0, 0.2);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #b0b0b0;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a;
            max-width: 700px;
            width: 100%;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            border: 1px solid rgba(255, 107, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 107, 0, 0.1);
            z-index: 10;
        }

        .close-modal:hover {
            color: #ff6b00;
        }

        .modal-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 0, 0.3);
        }

        .modal-title {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .modal-date {
            color: #b0b0b0;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal-date::before {
            content: '📅';
            color: #ff6b00;
        }

        .modal-description {
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b00, #ff8c00);
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            border: none;
        }

        .modal-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.3);
        }

        /* ===== RESPONSIVE STYLES (ADDED ONLY - NO ORIGINAL CODE MODIFIED) ===== */
        @media (max-width: 1024px) {
            .page-section {
                padding: 25px 20px;
            }
            
            .cert-grid {
                gap: 18px;
            }
        }

        @media (max-width: 768px) {
            .page-section {
                padding: 20px 16px;
            }
            
            .back-btn {
                padding: 8px 16px;
                font-size: 12px;
                margin-bottom: 20px;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .header {
                margin-bottom: 25px;
            }
            
            .cert-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .cert-card {
                max-width: 100%;
            }
            
            .cert-image {
                height: 160px;
            }
            
            .cert-content {
                padding: 14px;
            }
            
            .cert-title {
                font-size: 17px;
            }
            
            .cert-date {
                font-size: 12px;
            }
            
            .cert-description {
                font-size: 12px;
                -webkit-line-clamp: 2;
            }
            
            .cert-category {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .view-btn {
                font-size: 12px;
            }
            
            /* Modal responsive */
            .modal-content {
                padding: 20px;
                width: 95%;
                max-height: 85vh;
            }
            
            .modal-title {
                font-size: 20px;
            }
            
            .modal-date {
                font-size: 13px;
                margin-bottom: 12px;
            }
            
            .modal-description {
                font-size: 13px;
                line-height: 1.5;
                margin-bottom: 18px;
            }
            
            .modal-image {
                max-height: 220px;
                margin-bottom: 15px;
            }
            
            .modal-link {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .close-modal {
                top: 12px;
                right: 15px;
                width: 28px;
                height: 28px;
                font-size: 20px;
            }
            
            .empty-state {
                padding: 40px 15px;
            }
            
            .empty-state h3 {
                font-size: 20px;
            }
            
            .empty-state p {
                font-size: 13px;
            }
            
            .empty-state-icon {
                font-size: 45px;
            }
            
            .loading {
                padding: 30px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .page-section {
                padding: 15px 12px;
            }
            
            .back-btn {
                padding: 6px 12px;
                font-size: 11px;
                margin-bottom: 15px;
            }
            
            .page-title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 12px;
                padding-bottom: 8px;
            }
            
            .subtitle::after {
                width: 40px;
                height: 2px;
            }
            
            .cert-grid {
                gap: 14px;
            }
            
            .cert-image {
                height: 140px;
            }
            
            .cert-content {
                padding: 12px;
            }
            
            .cert-title {
                font-size: 16px;
            }
            
            .cert-date {
                font-size: 11px;
                margin-bottom: 8px;
            }
            
            .cert-description {
                font-size: 11px;
                margin-bottom: 10px;
            }
            
            .cert-category {
                font-size: 9px;
                margin-bottom: 8px;
            }
            
            .view-btn {
                font-size: 11px;
            }
            
            .modal-content {
                padding: 18px 15px;
            }
            
            .modal-title {
                font-size: 18px;
            }
            
            .modal-date {
                font-size: 12px;
            }
            
            .modal-description {
                font-size: 12px;
                line-height: 1.5;
            }
            
            .modal-image {
                max-height: 180px;
            }
            
            .modal-link {
                padding: 8px 14px;
                font-size: 12px;
            }
            
            .close-modal {
                top: 10px;
                right: 12px;
                width: 26px;
                height: 26px;
                font-size: 18px;
            }
            
            .empty-state h3 {
                font-size: 18px;
            }
            
            .empty-state p {
                font-size: 12px;
            }
            
            .empty-state-icon {
                font-size: 40px;
            }
        }

        /* Tablet landscape optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .cert-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
        }

        /* Small height devices */
        @media (max-height: 600px) {
            .modal-content {
                max-height: 90vh;
                overflow-y: auto;
            }
            
            .modal-image {
                max-height: 150px;
            }
            
            .modal-title {
                font-size: 20px;
            }
            
            .modal-description {
                font-size: 12px;
                line-height: 1.4;
            }
        }

        /* Very small screens */
        @media (max-width: 360px) {
            .cert-title {
                font-size: 15px;
            }
            
            .cert-description {
                font-size: 10px;
            }
            
            .cert-content {
                padding: 10px;
            }
            
            .cert-image {
                height: 130px;
            }
        }

        /* Ensure smooth transitions */
        .cert-card, .back-btn, .modal-link, .close-modal, .view-btn {
            transition: all 0.3s ease;
        }

        /* Modal scrollbar */
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: #ff6b00;
            border-radius: 10px;
        }

        /* Fix for overflow */
        .cert-grid, .page-section {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <section class="page-section">
        <a href="achievements.html" class="back-btn">← Back to Achievements</a>
        
        <div class="header">
            <h1 class="page-title">INDUSTRY CERTIFICATIONS</h1>
            <p class="subtitle">Professional credentials and certifications</p>
        </div>

        <div id="certificatesGrid" class="cert-grid"></div>
    </section>

    <!-- Modal -->
    <div id="certModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImage" class="modal-image" src="" alt="Certificate">
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalDate" class="modal-date"></p>
            <p id="modalDescription" class="modal-description"></p>
            <a id="modalLink" class="modal-link" href="#" target="_blank">View Certificate</a>
        </div>
    </div>
    <script src="/js/config.js"></script>
    <script>
        const API_BASE = `${BASE_URL}/api`;

        async function loadCertificates() {
            const grid = document.getElementById('certificatesGrid');
            grid.innerHTML = '<div class="loading">Loading certificates</div>';

            try {
                const response = await fetch(`${API_BASE}/achievements/category/industry`);
                const certificates = await response.json();

                if (certificates.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📜</div>
                            <h3>No Certificates Yet</h3>
                            <p>Check back later for new certifications</p>
                            <a href="achievements.html" class="back-btn" style="display: inline-block;">← Back</a>
                        </div>
                    `;
                    return;
                }

                certificates.sort((a, b) => {
                    if (!a.date) return 1;
                    if (!b.date) return -1;
                    return new Date(b.date) - new Date(a.date);
                });

                grid.innerHTML = certificates.map(cert => {
                    const fileUrl = cert.fileUrl ? `${BASE_URL}${cert.fileUrl}` : null;
                    const isImage = cert.fileType === 'image';
                    
                    return `
                        <div class="cert-card" onclick='openModal(${JSON.stringify(cert).replace(/'/g, "\\'")})'>
                            <div class="cert-image">
                                ${isImage && fileUrl ? 
                                    `<img src="${fileUrl}" alt="${cert.title}">` : 
                                    cert.fileType === 'pdf' ?
                                    '<div class="pdf-icon">📄</div>' :
                                    '<div style="font-size: 40px; color: #ff6b00;">📝</div>'
                                }
                            </div>
                            <div class="cert-content">
                                <span class="cert-category">Certificate</span>
                                <h3 class="cert-title">${cert.title}</h3>
                                <div class="cert-date">${cert.date || 'No date'}</div>
                                <p class="cert-description">${cert.description}</p>
                                <div class="cert-footer">
                                    <span class="view-btn">View Details →</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="empty-state">⚠️ Error loading certificates</div>`;
            }
        }

        function openModal(cert) {
            const modal = document.getElementById('certModal');
            const fileUrl = cert.fileUrl ? `${BASE_URL}${cert.fileUrl}` : '';
            
            document.getElementById('modalImage').src = fileUrl;
            document.getElementById('modalTitle').textContent = cert.title;
            document.getElementById('modalDate').textContent = cert.date || 'Date not specified';
            document.getElementById('modalDescription').textContent = cert.description;
            
            const modalLink = document.getElementById('modalLink');
            if (cert.link) {
                modalLink.href = cert.link;
                modalLink.style.display = 'inline-block';
            } else {
                modalLink.style.display = 'none';
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('certModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('certModal');
            if (event.target === modal) closeModal();
        }

        document.addEventListener('DOMContentLoaded', loadCertificates);
    </script>
</body>
</html>
