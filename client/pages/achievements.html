<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Achievements & Recognition | Portfolio</title>
    <style>
        /* ===== BASE RESET & THEME (SAME AS PREVIOUS) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            line-height: 1.5;
        }

        .achievements {
            padding: 60px 0 80px;
            position: relative;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Back button style (original theme) */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: rgba(255, 122, 0, 0.12);
            border: 1px solid rgba(255, 122, 0, 0.4);
            color: #ff9f4a;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(8px);
            letter-spacing: 0.3px;
            margin-bottom: 25px;
        }

        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-6px);
            box-shadow: 0 8px 20px rgba(255, 122, 0, 0.35);
            border-color: #ff7a00;
        }

        /* Title section */
        .title {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #dba588, #ec8e0b, #ff7a00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a0d155;
            border-left: 3px solid #ff7a00;
            padding-left: 20px;
            margin-bottom: 48px;
            font-weight: 400;
        }

        /* cards grid layout - responsive outside structure */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
            align-items: stretch;
        }

        /* individual card - same theme glassmorphism */
        .card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 24px 26px;
            width: calc(33.333% - 22px);
            min-width: 280px;
            flex: 1 1 320px;
            border: 1px solid rgba(255, 122, 0, 0.25);
            transition: transform 0.3s ease, border-color 0.2s ease, box-shadow 0.3s;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 122, 0, 0.65);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #ffc285);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            border-left: 4px solid #ff7a00;
            padding-left: 16px;
        }

        /* Thumbnail slider area */
        .thumbnail-slider {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 12px 0 16px;
            scroll-behavior: smooth;
            border-radius: 20px;
        }

        .thumb-track {
            display: flex;
            flex-direction: row;
            gap: 18px;
            align-items: center;
            padding: 6px 4px 14px 4px;
            scroll-snap-type: x mandatory;
        }

        /* ===== THUMBNAIL FIX: PROPER FIT, VISIBILITY, BOTH MOBILE & LAPTOP ===== */
        .thumb {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 18px;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.25s ease;
            background: #1e2a3e;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* PDF & no-file thumbnails */
        .thumb.pdf-thumb, .thumb.no-file {
            width: 110px;
            height: 110px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1f2a3e, #131c2c);
            border-radius: 18px;
            font-weight: 600;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
            font-size: 48px;
        }

        .thumb.active {
            border-color: #ff7a00;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 122, 0, 0.45);
        }

        /* card footer */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .view-btn {
            background: rgba(255, 122, 0, 0.15);
            border: 1px solid rgba(255, 122, 0, 0.5);
            color: #ffae6e;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .view-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            border-color: #ff7a00;
            transform: scale(1.02);
        }

        .accent-line {
            height: 3px;
            width: 70px;
            background: linear-gradient(90deg, #ff7a00, #ffb347);
            border-radius: 3px;
        }

        .no-items {
            text-align: center;
            padding: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            font-style: italic;
            color: #bbb;
            width: 100%;
        }

        /* MODAL (lightbox style) - keeps same theme */
        .achievement-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 12, 24, 0.92);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #101826;
            border-radius: 36px;
            max-width: 550px;
            width: 90%;
            padding: 28px 24px 32px;
            position: relative;
            border: 1px solid rgba(255, 122, 0, 0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            color: #ffaa66;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: #ff7a00;
            transform: scale(1.1);
        }

        #modal-image {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 20px;
            margin: 10px 0 18px;
            background: #0b1020;
            padding: 8px;
        }

        .modal-content h2 {
            font-size: 1.7rem;
            margin-bottom: 8px;
            color: #ffbd7a;
        }

        .modal-content p {
            color: #ccd6f0;
            margin: 6px 0;
            font-size: 0.95rem;
        }

        #modal-link {
            display: inline-block;
            margin-top: 18px;
            background: #ff7a00;
            padding: 10px 22px;
            border-radius: 40px;
            color: #0a0f1c;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        #modal-link:hover {
            background: #ff9533;
            transform: scale(1.02);
        }

        /* scrollbar beauty */
        .thumbnail-slider::-webkit-scrollbar {
            height: 5px;
        }

        .thumbnail-slider::-webkit-scrollbar-track {
            background: #1e2a3a;
            border-radius: 10px;
        }

        .thumbnail-slider::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 10px;
        }

        /* ===== RESPONSIVE LAYOUT: MOBILE + LAPTOP FULLY OPTIMIZED ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 0 24px;
            }
            .card {
                padding: 24px 20px;
            }
            .title {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 880px) {
            .cards {
                gap: 28px;
            }
            .card {
                width: calc(50% - 20px);
                min-width: 260px;
            }
        }

        @media (max-width: 768px) {
            .achievements {
                padding: 40px 0 60px;
            }
            .back-home-btn {
                padding: 8px 18px;
                font-size: 0.85rem;
                margin-bottom: 18px;
            }
            .title {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 32px;
                padding-left: 16px;
            }
            .cards {
                flex-direction: column;
                gap: 28px;
            }
            .card {
                width: 100%;
                padding: 22px 20px;
            }
            .card h2 {
                font-size: 1.6rem;
                margin-bottom: 18px;
            }

            /* 🔥 MOBILE THUMBNAILS PERFECT FITTED + VISIBILITY */
            .thumb {
                width: 28vw;
                height: 28vw;
                max-width: 130px;
                max-height: 130px;
                min-width: 100px;
                min-height: 100px;
                border-radius: 18px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 28vw;
                height: 28vw;
                max-width: 130px;
                max-height: 130px;
                min-width: 100px;
                min-height: 100px;
            }
            .thumb-track {
                gap: 15px;
                padding-bottom: 12px;
            }
            .card-footer {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .view-btn {
                padding: 7px 18px;
                font-size: 0.85rem;
            }
            .accent-line {
                width: 55px;
            }
        }

        @media (max-width: 550px) {
            .container {
                padding: 0 18px;
            }
            .title {
                font-size: 1.9rem;
            }
            .card {
                padding: 18px 16px;
            }
            .card h2 {
                font-size: 1.45rem;
                padding-left: 12px;
            }
            /* thumbnails perfect for small devices */
            .thumb {
                width: 38vw;
                height: 38vw;
                max-width: 145px;
                max-height: 145px;
                min-width: 105px;
                min-height: 105px;
                border-radius: 20px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 38vw;
                height: 38vw;
                max-width: 145px;
                max-height: 145px;
            }
            .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
                font-size: 42px;
            }
            .thumb-track {
                gap: 12px;
            }
            .view-btn {
                font-size: 0.8rem;
                padding: 6px 16px;
            }
        }

        @media (max-width: 420px) {
            .thumb {
                width: 42vw;
                height: 42vw;
                min-width: 115px;
                min-height: 115px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 42vw;
                height: 42vw;
            }
        }

        /* laptop large thumbnails remain neat */
        @media (min-width: 1025px) {
            .thumb {
                width: 130px;
                height: 130px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 130px;
                height: 130px;
            }
            .thumb-track {
                gap: 20px;
            }
        }

        /* extra large screens */
        @media (min-width: 1400px) {
            .thumb {
                width: 150px;
                height: 150px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 150px;
                height: 150px;
            }
        }

        /* small height modal fix */
        @media (max-height: 550px) {
            .modal-content {
                max-height: 85vh;
                overflow-y: auto;
            }
            #modal-image {
                max-height: 130px;
            }
        }
    </style>
</head>
<body>

<section class="achievements">
    <div class="container">
        <a href="/index.html" class="back-home-btn">← Back to Home</a>
        <h1 class="title">Achievements & Recognition</h1>
        <p class="subtitle">Certificates • Hackathons • Awards</p>

        <div class="cards" id="achievementsContainer">
            <!-- dynamic cards injected -->
        </div>
    </div>
</section>

<script>
// ========== CONFIG (same as original expectation) ==========
// If your config.js provides BASE_URL, otherwise fallback to empty or relative.
// To be safe we define BASE_URL if missing (keep compatibility)
let BASE_URL = '';
if (typeof window.BASE_URL !== 'undefined') {
    BASE_URL = window.BASE_URL;
} else if (typeof BASE_URL === 'undefined') {
    // fallback: empty string means relative paths work
    BASE_URL = '';
}

const API_BASE = `${BASE_URL}/api`;

// Helper: generate thumbnails with robust sizing & proper fit
function generateThumbnails(items) {
    if (!items || items.length === 0) {
        return `<div class="no-items">✨ No achievements yet</div>`;
    }
    
    return items.map((item, idx) => {
        const isActive = idx === 0 ? 'active' : '';
        const fileType = item.fileType || '';
        const fileUrl = item.fileUrl ? (item.fileUrl.startsWith('http') ? item.fileUrl : `${BASE_URL}${item.fileUrl}`) : '';
        
        // data attributes for modal preview
        const dataAttrs = `data-id="${item._id || ''}"
            data-title="${escapeHtml(item.title || 'Achievement')}"
            data-description="${escapeHtml(item.description || '')}"
            data-issuer="${escapeHtml(item.issuer || '')}"
            data-date="${escapeHtml(item.date || '')}"
            data-link="${escapeHtml(item.link || '')}"
            data-fileurl="${escapeHtml(fileUrl)}"
            data-filetype="${escapeHtml(fileType)}"`;
        
        if (fileType === 'image' && fileUrl) {
            return `<img src="${fileUrl}" 
                        class="thumb ${isActive}" 
                        ${dataAttrs}
                        alt="${escapeHtml(item.title)}"
                        loading="lazy"
                        onclick="showAchievementDetails(this)">`;
        } 
        else if (fileType === 'pdf' && fileUrl) {
            return `<div class="thumb pdf-thumb ${isActive}" ${dataAttrs} onclick="showAchievementDetails(this)">
                        <span>📄</span>
                        <span style="font-size: 11px;">PDF</span>
                    </div>`;
        } 
        else {
            // generic file / external link or no file icon
            return `<div class="thumb no-file ${isActive}" ${dataAttrs} onclick="showAchievementDetails(this)">
                        <span>🏅</span>
                        <span style="font-size: 10px;">${item.title ? item.title.slice(0,12) : 'View'}</span>
                    </div>`;
        }
    }).join('');
}

// helper to escape HTML to avoid injection
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

// show details modal or console log (optional)
function showAchievementDetails(thumbElement) {
    // remove active class from siblings, add to current
    const track = thumbElement.closest('.thumb-track');
    if (track) {
        track.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbElement.classList.add('active');
    }
    
    // gather data
    const title = thumbElement.dataset.title || 'Achievement';
    const description = thumbElement.dataset.description || '';
    const issuer = thumbElement.dataset.issuer || '';
    const date = thumbElement.dataset.date || '';
    const link = thumbElement.dataset.link || '';
    let fileUrl = thumbElement.dataset.fileurl || '';
    const fileType = thumbElement.dataset.filetype || '';
    
    // open modal with details
    openModal({
        title: title,
        description: description,
        issuer: issuer,
        date: date,
        link: link,
        fileUrl: fileUrl,
        fileType: fileType
    });
}

// Modal handling
function openModal(data) {
    let modal = document.querySelector('.achievement-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.className = 'achievement-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <img id="modal-image" src="" alt="Achievement preview" style="display: none;">
                <div id="modal-pdf-placeholder" style="display: none; padding: 20px; background: #0f1422; border-radius: 20px;">
                    <span style="font-size: 60px;">📄</span>
                    <p>PDF Document</p>
                </div>
                <h2 id="modal-title"></h2>
                <p id="modal-issuer"></p>
                <p id="modal-date"></p>
                <p id="modal-description"></p>
                <a id="modal-link" href="#" target="_blank" style="display: none;">🔗 View Resource</a>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    const modalImg = document.getElementById('modal-image');
    const pdfPlaceholder = document.getElementById('modal-pdf-placeholder');
    const modalTitle = document.getElementById('modal-title');
    const modalIssuer = document.getElementById('modal-issuer');
    const modalDate = document.getElementById('modal-date');
    const modalDesc = document.getElementById('modal-description');
    const modalLink = document.getElementById('modal-link');
    
    // Reset visibility
    modalImg.style.display = 'none';
    if(pdfPlaceholder) pdfPlaceholder.style.display = 'none';
    
    if (data.fileUrl && (data.fileType === 'image' || data.fileUrl.match(/\.(jpeg|jpg|png|gif|webp)/i))) {
        modalImg.src = data.fileUrl;
        modalImg.style.display = 'block';
    } else if (data.fileType === 'pdf' || (data.fileUrl && data.fileUrl.includes('.pdf'))) {
        if(pdfPlaceholder) pdfPlaceholder.style.display = 'flex';
        pdfPlaceholder.style.justifyContent = 'center';
        pdfPlaceholder.style.alignItems = 'center';
        pdfPlaceholder.style.flexDirection = 'column';
    } else {
        if(pdfPlaceholder) pdfPlaceholder.style.display = 'flex';
        pdfPlaceholder.innerHTML = '<span style="font-size: 55px;">🌟</span><p>Special Recognition</p>';
        pdfPlaceholder.style.display = 'flex';
    }
    
    modalTitle.innerText = data.title || 'Achievement';
    modalIssuer.innerText = data.issuer ? `🏢 ${data.issuer}` : '';
    modalDate.innerText = data.date ? `📅 ${data.date}` : '';
    modalDesc.innerText = data.description || '';
    
    if (data.link && data.link !== '') {
        modalLink.href = data.link;
        modalLink.style.display = 'inline-block';
        modalLink.innerText = '🔗 Open External Link';
    } else if (data.fileUrl && (data.fileType === 'pdf' || data.fileUrl.includes('.pdf'))) {
        modalLink.href = data.fileUrl;
        modalLink.style.display = 'inline-block';
        modalLink.innerText = '📄 Open PDF Document';
    } else {
        modalLink.style.display = 'none';
    }
    
    modal.style.display = 'flex';
}

window.closeModal = function() {
    const modal = document.querySelector('.achievement-modal');
    if (modal) modal.style.display = 'none';
};

// viewAll navigation
function viewAll(category) {
    const pages = {
        'industry': 'certificates.html',
        'competitive': 'hackathons.html',
        'milestone': 'milestones.html'
    };
    const target = pages[category] || 'achievements.html';
    window.location.href = target;
}

// fallback data (ensures no empty UI)
function getFallbackAchievements() {
    return {
        industry: [
            { _id: 'f1', title: 'AWS Cloud Practitioner', description: 'Certified Cloud Practitioner', issuer: 'Amazon', date: '2024', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/secone-1.png', link: '' },
            { _id: 'f2', title: 'Google IT Support', description: 'Professional Certificate', issuer: 'Google', date: '2023', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/secone-2.png', link: '' },
            { _id: 'f3', title: 'Scrum Master', description: 'Agile certified', issuer: 'Scrum Alliance', date: '2024', fileType: 'pdf', fileUrl: '/assets/images/ach-thumnails/secone-3.png', link: '' }
        ],
        competitive: [
            { _id: 'c1', title: 'HackAI 2024 Winner', description: '1st Place AI solution', issuer: 'TechFest', date: '2024', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/sectwo-1.jpg', link: '' },
            { _id: 'c2', title: 'Code Warriors Finalist', description: 'Top 5 nationwide', issuer: 'Code League', date: '2023', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/sectwo-2.jpg', link: '' },
            { _id: 'c3', title: 'Smart India Hackathon', description: 'Grand finale participant', issuer: 'Govt of India', date: '2024', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/sectwo-4.jpg', link: '' }
        ],
        milestones: [
            { _id: 'm1', title: 'Open Source Contributor', description: '50+ PR merges', issuer: 'GitHub', date: '2024', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/secthree-1.jpg', link: '' },
            { _id: 'm2', title: 'Published Research Paper', description: 'IEEE conference', issuer: 'IEEE', date: '2023', fileType: 'pdf', fileUrl: '/assets/images/ach-thumnails/secthree-2.jpg', link: '' },
            { _id: 'm3', title: '1000+ LeetCode Problems', description: 'Advanced DSA milestone', issuer: 'LeetCode', date: '2024', fileType: 'image', fileUrl: '/assets/images/ach-thumnails/secthree-3.jpg', link: '' }
        ]
    };
}

// Load achievements from API with fallback
async function loadAchievements() {
    try {
        let industryData = [], competitiveData = [], milestonesData = [];
        let useApiData = false;
        
        try {
            const response = await fetch(`${API_BASE}/achievements/all`);
            if (response.ok) {
                const achievements = await response.json();
                if (Array.isArray(achievements) && achievements.length > 0) {
                    industryData = achievements.filter(a => a.category === 'industry');
                    competitiveData = achievements.filter(a => a.category === 'competitive');
                    milestonesData = achievements.filter(a => a.category === 'milestone');
                    useApiData = true;
                }
            }
        } catch(e) { console.warn('API failed, using fallback', e); }
        
        if (!useApiData || (industryData.length === 0 && competitiveData.length === 0 && milestonesData.length === 0)) {
            const fallback = getFallbackAchievements();
            industryData = fallback.industry;
            competitiveData = fallback.competitive;
            milestonesData = fallback.milestones;
        }
        
        const container = document.getElementById('achievementsContainer');
        container.innerHTML = `
            <div class="card">
                <h2>🏆Certifications</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="industry-thumbnails">
                        ${generateThumbnails(industryData)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('industry')">View All →</button>
                    <span class="accent-line"></span>
                </div>
            </div>
            <div class="card">
                <h2>⚡Competitions</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="competitive-thumbnails">
                        ${generateThumbnails(competitiveData)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('competitive')">View All →</button>
                    <span class="accent-line"></span>
                </div>
            </div>
            <div class="card">
                <h2>🌟 Milestones</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="milestones-thumbnails">
                        ${generateThumbnails(milestonesData)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('milestone')">View All →</button>
                    <span class="accent-line"></span>
                </div>
            </div>
        `;
        
        // auto set first active state if needed but generateThumbnails already marks first active
        document.querySelectorAll('.thumb-track').forEach(track => {
            const first = track.querySelector('.thumb');
            if(first && !first.classList.contains('active')) first.classList.add('active');
        });
        
    } catch (error) {
        console.error('Load error:', error);
        showFallbackContentDirect();
    }
}

function showFallbackContentDirect() {
    const fallback = getFallbackAchievements();
    const container = document.getElementById('achievementsContainer');
    container.innerHTML = `
        <div class="card">
            <h2>🏆 Industry Credentials</h2>
            <div class="thumbnail-slider"><div class="thumb-track">${generateThumbnails(fallback.industry)}</div></div>
            <div class="card-footer"><button class="view-btn" onclick="viewAll('industry')">View All →</button><span class="accent-line"></span></div>
        </div>
        <div class="card">
            <h2>⚡ Competitive Highlights</h2>
            <div class="thumbnail-slider"><div class="thumb-track">${generateThumbnails(fallback.competitive)}</div></div>
            <div class="card-footer"><button class="view-btn" onclick="viewAll('competitive')">View All →</button><span class="accent-line"></span></div>
        </div>
        <div class="card">
            <h2>🌟 Milestones</h2>
            <div class="thumbnail-slider"><div class="thumb-track">${generateThumbnails(fallback.milestones)}</div></div>
            <div class="card-footer"><button class="view-btn" onclick="viewAll('milestone')">View All →</button><span class="accent-line"></span></div>
        </div>
    `;
}

// Close modal when clicking outside
document.addEventListener('click', function(e) {
    const modal = document.querySelector('.achievement-modal');
    if (modal && modal.style.display === 'flex') {
        if (e.target === modal) closeModal();
    }
});

document.addEventListener('DOMContentLoaded', loadAchievements);
</script>
