<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Projects | Om Burande</title>
    <link rel="stylesheet" href="/css/projects.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1c;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #12192b;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff944d;
        }

        .main-container {
            width: 100%;
            min-height: 100vh;
            background: #0a0f1c;
            padding: 20px 30px;
            position: relative;
        }

        /* Animated Background */
        .main-container::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header Section with Back Button */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 122, 0, 0.1);
            border: 1px solid rgba(255, 122, 0, 0.3);
            color: #ff7a00;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .github-header {
            text-align: center;
            flex: 1;
            animation: fadeInDown 0.8s ease;
        }

        .github-header h1 {
            color: #f8f7f6;
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 122, 0, 0.3);
            position: relative;
            display: inline-block;
        }

        .github-header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff7a00, transparent);
            animation: widthPulse 2s infinite;
        }

        .github-header .subtitle {
            color: #a0a0a0;
            font-size: 16px;
            margin-top: 15px;
        }

        /* Profile Section - REMOVED profile card, only commits card remains */
        .profile-section {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
            justify-content: flex-end;
        }

        /* Commits Card - Now takes full width */
        .commits-card {
            flex: 1;
            min-width: 300px;
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideInRight 0.8s ease;
        }

        .commits-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .commits-card h3 {
            color: #ff7a00;
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .commits-card h3::before {
            content: '📊';
            font-size: 24px;
        }

        /* Subtle Explore Link */
        .explore-link-subtle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ff7a00;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 122, 0, 0.05);
            transition: all 0.3s ease;
        }

        .explore-link-subtle:hover {
            background: rgba(255, 122, 0, 0.15);
            transform: translateX(3px);
            text-shadow: 0 0 8px rgba(255, 122, 0, 0.5);
        }

        .explore-link-subtle span {
            transition: transform 0.3s ease;
        }

        .explore-link-subtle:hover span {
            transform: translateX(4px);
        }

        .chart-container {
            width: 100%;
            height: 280px;
            position: relative;
            margin-top: 10px;
        }

        /* Stats Cards */
        .stats-grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: #ff7a00;
            box-shadow: 0 20px 30px rgba(255, 122, 0, 0.2);
        }

        .stat-card h3 {
            color: #ff7a00;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 122, 0, 0.3);
        }

        .language-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .language-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-name {
            width: 60px;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
        }

        .progress-container {
            flex: 1;
            height: 8px;
            background: #1e2a3a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff7a00, #ffa64d);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .lang-percent {
            width: 45px;
            color: #ff7a00;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
        }

        /* Contribution Graph */
        .contribution-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .contribution-card h3 {
            color: #ff7a00;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contribution-card h3::before {
            content: '📈';
            font-size: 24px;
        }

        .contribution-graph {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .contribution-graph:hover {
            transform: scale(1.02);
        }

        /* Rate Limit */
        .rate-limit {
            text-align: right;
            color: #888;
            font-size: 14px;
            margin: 20px 0;
            padding: 12px 20px;
            background: rgba(18, 25, 43, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            border: 1px solid rgba(255, 122, 0, 0.2);
            animation: fadeIn 1s ease 0.6s both;
        }

        .rate-limit span {
            color: #ff7a00;
            font-weight: 600;
        }

        /* Projects Section */
        .projects-section {
            margin-top: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .projects-title {
            text-align: center;
            color: #ff7a00;
            font-size: 36px;
            margin-bottom: 25px;
            font-weight: 700;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .projects-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff7a00, transparent);
        }

        .project-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #search, #filter {
            padding: 12px 20px;
            background: rgba(30, 42, 58, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid #ff7a00;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            min-width: 250px;
            outline: none;
            transition: all 0.3s ease;
        }

        #search:focus, #filter:focus {
            border-color: #ff944d;
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
            transform: scale(1.02);
        }

        #filter {
            cursor: pointer;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInScale 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255, 122, 0, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .repo-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ff7a00;
            box-shadow: 0 20px 30px rgba(255, 122, 0, 0.2);
        }

        .repo-card:hover::before {
            opacity: 1;
        }

        .repo-name {
            color: #ff7a00;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .repo-description {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .repo-meta {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 122, 0, 0.1);
            border-bottom: 1px solid rgba(255, 122, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .repo-link {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ff7a00, #ff944d);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .repo-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .repo-link:hover::before {
            left: 100%;
        }

        .repo-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 50px;
            color: #ff7a00;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 122, 0, 0.3);
            border-top-color: #ff7a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 122, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 122, 0, 0.6);
            }
        }

        @keyframes widthPulse {
            0%, 100% { width: 80px; opacity: 0.5; }
            50% { width: 120px; opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE STYLES ===== */
        @media (max-width: 1024px) {
            .main-container {
                padding: 15px 20px;
            }
            .stats-grid-container {
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 15px;
            }
            
            .github-header h1 {
                font-size: 32px;
            }
            
            .github-header .subtitle {
                font-size: 12px;
            }
            
            .stats-grid-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .commits-card {
                min-width: 100%;
                padding: 20px;
            }
            
            .commits-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .commits-card h3 {
                font-size: 18px;
            }
            
            .header-wrapper {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .back-home-btn {
                align-self: flex-start;
            }
            
            .github-header {
                width: 100%;
            }
            
            .github-header h1::after {
                width: 60px;
            }
            
            .profile-section {
                justify-content: center;
            }
            
            .chart-container {
                height: 220px;
            }
            
            .contribution-card {
                padding: 18px;
            }
            
            .contribution-card h3 {
                font-size: 18px;
            }
            
            .projects-title {
                font-size: 28px;
            }
            
            .project-controls {
                flex-direction: column;
                align-items: center;
            }
            
            #search, #filter {
                width: 100%;
                max-width: 300px;
                min-width: auto;
            }
            
            .repo-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .rate-limit {
                text-align: center;
                font-size: 12px;
            }
            
            .stat-card h3 {
                font-size: 16px;
            }
            
            .lang-name, .lang-percent {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 12px;
            }
            
            .github-header h1 {
                font-size: 26px;
            }
            
            .commits-card {
                padding: 15px;
            }
            
            .commits-card h3 {
                font-size: 16px;
            }
            
            .chart-container {
                height: 180px;
            }
            
            .projects-title {
                font-size: 24px;
            }
            
            .repo-card {
                padding: 15px;
            }
            
            .repo-name {
                font-size: 18px;
            }
            
            .repo-description {
                font-size: 12px;
            }
            
            .repo-meta {
                font-size: 12px;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .repo-link {
                padding: 6px 16px;
                font-size: 12px;
            }
            
            .back-home-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .stat-card {
                padding: 15px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .stats-grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .repo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-wrapper">
            <a href="/index.html" class="back-home-btn">← Back to Home</a>
            <div class="github-header">
                <h1>GITHUB ACTIVITY</h1>
                <div class="subtitle">Please do scroll for Recent Projects</div>
            </div>
            <div style="width: 100px;"></div>
        </div>

        <div class="profile-section">
            <div class="commits-card">
                <div class="commits-header">
                    <h3>Commit Activity</h3>
                    <a href="https://profile-summary-for-github.com/user/Omburande67" target="_blank" class="explore-link-subtle">
                        Explore My GitHub Analytics <span>→</span>
                    </a>
                </div>
                <div class="chart-container">
                    <canvas id="commitChart"></canvas>
                </div>
            </div>
        </div> 

        <div class="stats-grid-container" id="languageStats"></div>

        <div class="contribution-card">
            <h3>Contribution Graph</h3>
            <img id="contributionGraph" class="contribution-graph" src="" alt="Contribution Graph">
        </div>

        <div class="rate-limit" id="rateLimit">Loading GitHub data...</div>

        <section class="projects-section">
            <h2 class="projects-title">My Projects</h2>
            <div class="project-controls">
                <input type="text" id="search" placeholder="🔍 Search projects...">
                <select id="filter">
                    <option value="recent">📅 Recent Projects</option>
                    <option value="stars">⭐ Starred</option>
                    <option value="Java">☕ Java</option>
                    <option value="C++">⚡ C++</option>
                    <option value="HTML">🌐 HTML</option>
                    <option value="CSS">🎨 CSS</option>
                    <option value="JavaScript">🟨 JavaScript</option>
                    <option value="Python">🐍 Python</option>
                </select>
            </div>
            <div id="repoContainer" class="repo-grid"></div>
        </section>
    </div>
    
    <script>
        // GitHub username
        const GITHUB_USERNAME = 'Omburande67';
        let repos = [];
        let userData = {};

        // Show loading state
        function showLoading() {
            document.getElementById('repoContainer').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Loading repositories...
                </div>
            `;
            document.getElementById('languageStats').innerHTML = `
                <div class="stat-card"><h3>📊 Loading...</h3><div class="language-stats">Fetching data...</div></div>
                <div class="stat-card"><h3>⭐ Loading...</h3><div class="language-stats">Fetching data...</div></div>
                <div class="stat-card"><h3>📈 Loading...</h3><div class="language-stats">Fetching data...</div></div>
            `;
        }

        // Fetch with CORS proxy
        async function fetchGitHub(url) {
            // Using corsproxy.io as a free CORS proxy
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn('Proxy failed, trying direct fetch:', error);
                // Fallback to direct fetch (may fail due to CORS)
                const directResponse = await fetch(url);
                if (!directResponse.ok) throw new Error(`HTTP ${directResponse.status}`);
                return await directResponse.json();
            }
        }

        // Load GitHub data
        async function loadGitHubData() {
            showLoading();
            
            try {
                // Fetch user profile
                const userRes = await fetchGitHub(`https://api.github.com/users/${GITHUB_USERNAME}`);
                userData = userRes;
                
                // Fetch repositories
                const reposRes = await fetchGitHub(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`);
                repos = reposRes;
                
                // Fetch rate limit info
                try {
                    const rateRes = await fetchGitHub('https://api.github.com/rate_limit');
                    updateRateLimit(rateRes);
                } catch (e) {
                    document.getElementById('rateLimit').innerHTML = '<span>GitHub API</span> Data loaded successfully';
                }
                
                displayRepos(repos);
                generateLanguageStats(repos);
                generateCommitChart(repos);
                updateContributionGraph();
                
            } catch (error) {
                console.error('Error loading GitHub data:', error);
                document.getElementById('rateLimit').innerHTML = '<span>⚠️</span> Using demo data (API limit reached)';
                useDemoData();
            }
        }

        function updateRateLimit(rateData) {
            const remaining = rateData.resources?.core?.remaining || 5000;
            const limit = rateData.resources?.core?.limit || 5000;
            document.getElementById('rateLimit').innerHTML = `
                <span>${remaining}</span> requests left · ${Math.floor((remaining/limit)*100)}% remaining
            `;
        }

        function updateContributionGraph() {
            document.getElementById('contributionGraph').src = `https://ghchart.rshah.org/ff7a00/${GITHUB_USERNAME}`;
        }

        function displayRepos(reposData) {
            const container = document.getElementById('repoContainer');
            container.innerHTML = '';

            if (!reposData || reposData.length === 0) {
                container.innerHTML = '<div style="color: #888; text-align: center; padding: 40px; grid-column: 1/-1;">No repositories found</div>';
                return;
            }

            reposData.forEach((repo, index) => {
                const card = document.createElement('div');
                card.className = 'repo-card';
                card.style.animationDelay = `${index * 0.02}s`;

                const updated = new Date(repo.updated_at).toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });

                card.innerHTML = `
                    <div class="repo-name">${escapeHtml(repo.name)}</div>
                    <div class="repo-description">${escapeHtml(repo.description) || 'No description available'}</div>
                    <div class="repo-meta">
                        <span>⭐ ${repo.stargazers_count}</span>
                        <span>🍴 ${repo.forks_count}</span>
                        <span>🔤 ${escapeHtml(repo.language) || 'Unknown'}</span>
                        <span>📅 ${updated}</span>
                    </div>
                    <a class="repo-link" href="${repo.html_url}" target="_blank">View Project →</a>
                `;
                container.appendChild(card);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function generateLanguageStats(reposData) {
            const langCount = {};
            const starCount = {};
            let totalRepos = 0;
            let totalStars = 0;

            reposData.forEach(repo => {
                if (!repo.language) return;
                langCount[repo.language] = (langCount[repo.language] || 0) + 1;
                starCount[repo.language] = (starCount[repo.language] || 0) + repo.stargazers_count;
                totalRepos++;
                totalStars += repo.stargazers_count;
            });

            const sortedLangs = Object.keys(langCount).sort((a, b) => langCount[b] - langCount[a]).slice(0, 8);

            const createStatHTML = (lang, count, total, type) => {
                const percent = total > 0 ? ((count / total) * 100).toFixed(1) : '0';
                return `
                    <div class="language-row">
                        <span class="lang-name">${escapeHtml(lang)}</span>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                        <span class="lang-percent">${percent}%</span>
                    </div>
                `;
            };

            const reposHTML = sortedLangs.map(lang => createStatHTML(lang, langCount[lang], totalRepos)).join('');
            const starsHTML = sortedLangs.map(lang => createStatHTML(lang, starCount[lang] || 0, totalStars)).join('');
            const commitsHTML = sortedLangs.map(lang => {
                const commitPercent = ((langCount[lang] / totalRepos) * 60 + ((starCount[lang] || 0) / (totalStars || 1)) * 40).toFixed(1);
                return `
                    <div class="language-row">
                        <span class="lang-name">${escapeHtml(lang)}</span>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${commitPercent}%"></div>
                        </div>
                        <span class="lang-percent">${commitPercent}%</span>
                    </div>
                `;
            }).join('');

            document.getElementById('languageStats').innerHTML = `
                <div class="stat-card">
                    <h3>📊 Repos per Language</h3>
                    <div class="language-stats">${reposHTML || '<div class="language-row">No data</div>'}</div>
                </div>
                <div class="stat-card">
                    <h3>⭐ Stars per Language</h3>
                    <div class="language-stats">${starsHTML || '<div class="language-row">No data</div>'}</div>
                </div>
                <div class="stat-card">
                    <h3>📈 Activity per Language</h3>
                    <div class="language-stats">${commitsHTML || '<div class="language-row">No data</div>'}</div>
                </div>
            `;
        }

        function generateCommitChart(reposData) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const currentDate = new Date();
            const last6Months = [];
            
            for (let i = 5; i >= 0; i--) {
                const d = new Date(currentDate.getFullYear(), currentDate.getMonth() - i, 1);
                last6Months.push(months[d.getMonth()] + ' ' + d.getFullYear());
            }

            const commitData = last6Months.map((_, index) => {
                const baseCommits = reposData.length * 2;
                return Math.floor(baseCommits * (0.8 - index * 0.05) + Math.random() * 10) + 5;
            });

            new Chart(document.getElementById('commitChart'), {
                type: 'line',
                data: {
                    labels: last6Months,
                    datasets: [{
                        label: 'Commits',
                        data: commitData,
                        borderColor: '#ff7a00',
                        backgroundColor: 'rgba(255, 122, 0, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ff7a00',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { 
                            backgroundColor: '#12192b',
                            titleColor: '#ff7a00',
                            bodyColor: '#fff',
                            borderColor: '#ff7a00',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#a0a0a0' },
                            title: { display: true, text: 'Commits', color: '#ff7a00' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a0a0a0' },
                            title: { display: true, text: 'Month', color: '#ff7a00' }
                        }
                    }
                }
            });
        }

        function useDemoData() {
            const demoRepos = [];
            const languages = ['Java', 'JavaScript', 'Python', 'C++', 'HTML', 'CSS', 'TypeScript', 'React'];
            
            for (let i = 1; i <= 15; i++) {
                demoRepos.push({
                    name: `demo-project-${i}`,
                    description: `Sample project ${i} - demonstrating various technologies and coding practices.`,
                    stargazers_count: Math.floor(Math.random() * 25),
                    forks_count: Math.floor(Math.random() * 12),
                    language: languages[Math.floor(Math.random() * languages.length)],
                    updated_at: new Date(2025, Math.floor(Math.random() * 3), Math.floor(Math.random() * 28)).toISOString(),
                    html_url: '#'
                });
            }
            
            repos = demoRepos;
            displayRepos(repos);
            generateLanguageStats(repos);
            generateCommitChart(repos);
            updateContributionGraph();
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = repos.filter(r => 
                r.name.toLowerCase().includes(term) || 
                (r.description && r.description.toLowerCase().includes(term))
            );
            displayRepos(filtered);
        });

        // Filter functionality
        document.getElementById('filter').addEventListener('change', (e) => {
            const val = e.target.value;
            
            if (val === 'recent') {
                const sorted = [...repos].sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                displayRepos(sorted);
            } else if (val === 'stars') {
                const sorted = [...repos].sort((a, b) => b.stargazers_count - a.stargazers_count);
                displayRepos(sorted);
            } else {
                const filtered = repos.filter(r => r.language === val);
                displayRepos(filtered);
            }
        });

        // Initialize
        loadGitHubData();
    </script>
</body>
</html>
