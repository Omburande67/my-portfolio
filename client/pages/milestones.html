<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Milestones</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#0a0a0a;
color:#ffffff;
min-height:100vh;
overflow-x:hidden;
}

/* Animated Background */

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%, rgba(255,107,0,0.15) 0%, transparent 45%),
radial-gradient(circle at 70% 60%, rgba(255,107,0,0.15) 0%, transparent 45%);
pointer-events:none;
z-index:-1;
}

.page-section{
max-width:1200px;
margin:0 auto;
padding:40px 20px 40px;
}

/* Back button */

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:12px 24px;
background:rgba(255,107,0,0.1);
border:1px solid rgba(255,107,0,0.3);
color:#ff6b00;
text-decoration:none;
border-radius:8px;
font-weight:500;
margin-bottom:35px;
transition:0.3s;
}

.back-btn:hover{
background:#ff6b00;
color:#0a0a0a;
transform:translateX(-5px);
}

/* Header */

.header{
text-align:center;
margin-bottom:45px;
}

.page-title{
font-size:48px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#b0b0b0;
font-size:18px;
}

/* Timeline */

.timeline{
position:relative;
padding:10px 0;
}

.timeline::before{
content:'';
position:absolute;
left:50%;
transform:translateX(-50%);
width:4px;
height:100%;
background:linear-gradient(180deg,#ff6b00,#ff8c00,transparent);
border-radius:2px;
}

/* Timeline Item */

.timeline-item{
position:relative;
margin-bottom:40px; /* REDUCED GAP */
width:100%;
display:flex;
justify-content:center;
}

/* Badge */

.timeline-badge{
position:absolute;
left:50%;
transform:translateX(-50%);
width:60px; /* reduced */
height:60px;
background:linear-gradient(135deg,#ff6b00,#ff8c00);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
z-index:2;
box-shadow:0 0 20px rgba(255,107,0,0.5);
}

/* Card */

.timeline-content{
width:45%;
background:rgba(20,20,20,0.95);
border-radius:18px;
padding:22px; /* reduced padding */
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,107,0,0.2);
}

.timeline-content:hover{
transform:scale(1.03);
border-color:#ff6b00;
}

.timeline-item:nth-child(odd) .timeline-content{
margin-right:auto;
}

.timeline-item:nth-child(even) .timeline-content{
margin-left:auto;
}

/* Card text */

.milestone-title{
font-size:22px;
font-weight:600;
margin-bottom:8px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.milestone-date{
color:#ff6b00;
font-weight:500;
margin-bottom:10px;
}

.milestone-desc{
color:#a0a0a0;
line-height:1.5;
margin-bottom:12px; /* reduced */
}

/* Image */

.milestone-image{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:8px;
margin-top:10px; /* reduced */
border:2px solid rgba(255,107,0,0.3);
}

/* Modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:1000;
justify-content:center;
align-items:center;
}

.modal-content{
background:#1a1a1a;
max-width:800px;
width:90%;
border-radius:20px;
padding:35px;
border:1px solid rgba(255,107,0,0.3);
position:relative;
max-height:90vh;
overflow-y:auto;
}

.close-modal{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
color:#999;
transition:0.3s;
}

.close-modal:hover{
color:#ff6b00;
}

.modal-image{
width:100%;
max-height:380px;
object-fit:contain;
margin-bottom:20px;
border-radius:12px;
}

.modal-title{
font-size:30px;
margin-bottom:10px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.modal-description{
color:#a0a0a0;
line-height:1.7;
margin-bottom:25px;
}

.modal-link{
display:inline-block;
padding:14px 28px;
background:linear-gradient(135deg,#ff6b00,#ff8c00);
color:#0a0a0a;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

.modal-link:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(255,107,0,0.3);
}

/* ===== RESPONSIVE STYLES (ADDED ONLY - NO ORIGINAL CODE MODIFIED) ===== */
@media (max-width: 1024px) {
    .page-section {
        padding: 30px 20px;
    }
    
    .timeline-content {
        width: 48%;
        padding: 18px;
    }
    
    .milestone-title {
        font-size: 20px;
    }
    
    .page-title {
        font-size: 42px;
    }
}

@media (max-width: 768px) {
    .page-section {
        padding: 25px 16px;
    }
    
    .back-btn {
        padding: 10px 18px;
        font-size: 14px;
        margin-bottom: 25px;
    }
    
    .page-title {
        font-size: 32px;
    }
    
    .subtitle {
        font-size: 14px;
    }
    
    .header {
        margin-bottom: 30px;
    }
    
    /* Timeline becomes vertical on mobile */
    .timeline::before {
        left: 30px;
        transform: none;
    }
    
    .timeline-item {
        margin-bottom: 35px;
        justify-content: flex-start;
    }
    
    .timeline-badge {
        left: 30px;
        transform: none;
        width: 50px;
        height: 50px;
        font-size: 22px;
    }
    
    .timeline-content {
        width: calc(100% - 70px);
        margin-left: 70px !important;
        margin-right: 0 !important;
        padding: 18px;
    }
    
    .timeline-item:nth-child(odd) .timeline-content,
    .timeline-item:nth-child(even) .timeline-content {
        margin-left: 70px;
        margin-right: 0;
    }
    
    .milestone-title {
        font-size: 18px;
    }
    
    .milestone-date {
        font-size: 13px;
    }
    
    .milestone-desc {
        font-size: 14px;
    }
    
    .milestone-image {
        max-height: 140px;
    }
    
    /* Modal responsive */
    .modal-content {
        padding: 25px 20px;
        width: 95%;
        max-height: 85vh;
    }
    
    .modal-title {
        font-size: 24px;
    }
    
    .modal-description {
        font-size: 14px;
        line-height: 1.6;
    }
    
    .modal-image {
        max-height: 250px;
    }
    
    .modal-link {
        padding: 12px 24px;
        font-size: 14px;
    }
    
    .close-modal {
        top: 15px;
        right: 20px;
        font-size: 28px;
    }
}

@media (max-width: 480px) {
    .page-section {
        padding: 20px 12px;
    }
    
    .back-btn {
        padding: 8px 14px;
        font-size: 12px;
        gap: 6px;
        margin-bottom: 20px;
    }
    
    .page-title {
        font-size: 26px;
    }
    
    .subtitle {
        font-size: 12px;
    }
    
    .timeline::before {
        left: 22px;
        width: 3px;
    }
    
    .timeline-badge {
        left: 22px;
        width: 42px;
        height: 42px;
        font-size: 18px;
    }
    
    .timeline-content {
        width: calc(100% - 58px);
        margin-left: 58px !important;
        padding: 14px;
    }
    
    .timeline-item:nth-child(odd) .timeline-content,
    .timeline-item:nth-child(even) .timeline-content {
        margin-left: 58px;
    }
    
    .milestone-title {
        font-size: 16px;
    }
    
    .milestone-date {
        font-size: 11px;
        margin-bottom: 6px;
    }
    
    .milestone-desc {
        font-size: 12px;
        margin-bottom: 8px;
    }
    
    .milestone-image {
        max-height: 120px;
        margin-top: 8px;
    }
    
    .timeline-item {
        margin-bottom: 28px;
    }
    
    .modal-content {
        padding: 20px 15px;
    }
    
    .modal-title {
        font-size: 20px;
        margin-bottom: 8px;
    }
    
    .modal-description {
        font-size: 13px;
        margin-bottom: 20px;
    }
    
    .modal-image {
        max-height: 200px;
        margin-bottom: 15px;
    }
    
    .modal-link {
        padding: 10px 20px;
        font-size: 13px;
    }
    
    .close-modal {
        top: 12px;
        right: 15px;
        font-size: 24px;
    }
}

/* Tablet landscape optimization */
@media (min-width: 769px) and (max-width: 1024px) {
    .timeline-content {
        width: 47%;
        padding: 20px;
    }
    
    .milestone-title {
        font-size: 20px;
    }
    
    .milestone-desc {
        font-size: 13px;
    }
}

/* Fix for small height devices */
@media (max-height: 600px) {
    .modal-content {
        max-height: 90vh;
        overflow-y: auto;
    }
    
    .modal-image {
        max-height: 150px;
    }
    
    .modal-title {
        font-size: 22px;
    }
}

/* Ensure smooth transitions */
.timeline-content, .back-btn, .modal-link, .close-modal {
    transition: all 0.3s ease;
}

/* Fix for modal scroll */
.modal-content::-webkit-scrollbar {
    width: 6px;
}

.modal-content::-webkit-scrollbar-track {
    background: #2a2a2a;
    border-radius: 10px;
}

.modal-content::-webkit-scrollbar-thumb {
    background: #ff6b00;
    border-radius: 10px;
}

/* Loading state */
.timeline:contains('Loading...') {
    text-align: center;
    padding: 50px;
    color: #ff6b00;
}

</style>
</head>

<body>

<section class="page-section">

<a href="achievements.html" class="back-btn">← Back to Achievements</a>

<div class="header">
<h1 class="page-title">Milestones</h1>
<p class="subtitle">Key achievements and career highlights</p>
</div>

<div class="timeline" id="milestonesTimeline"></div>

</section>

<!-- Modal -->

<div id="milestoneModal" class="modal">

<div class="modal-content">

<span class="close-modal" onclick="closeModal()">&times;</span>

<img id="modalImage" class="modal-image">

<h2 id="modalTitle" class="modal-title"></h2>

<p id="modalDate" style="color:#ff6b00; margin-bottom:15px;"></p>

<p id="modalDescription" class="modal-description"></p>

<a id="modalLink" class="modal-link" target="_blank">View Details</a>

</div>
</div>
<script src="/js/config.js"></script>
<script>

const API_BASE=`${BASE_URL}/api`;

async function loadMilestones(){

const timeline=document.getElementById('milestonesTimeline');

timeline.innerHTML='<div style="text-align:center; padding:50px; color:#ff6b00;">Loading milestones...</div>';

try{

const response=await fetch(`${API_BASE}/achievements/category/milestone`);

const milestones=await response.json();

milestones.sort((a,b)=>new Date(b.date)-new Date(a.date));

if(milestones.length === 0){
timeline.innerHTML='<div style="text-align:center; padding:50px; color:#a0a0a0;">No milestones found</div>';
return;
}

timeline.innerHTML=milestones.map((milestone,index)=>{

const fileUrl=milestone.fileUrl?`${BASE_URL}${milestone.fileUrl}`:'';

const icons=['🥇','🥈','🥉','🎯','⭐','✨'];

const icon=icons[index]||'🎯';

return`

<div class="timeline-item">

<div class="timeline-badge">${icon}</div>

<div class="timeline-content" onclick='openModal(${JSON.stringify(milestone).replace(/'/g,"\\'")})'>

<h3 class="milestone-title">${milestone.title}</h3>

<div class="milestone-date">${milestone.date||'Date not specified'}</div>

<p class="milestone-desc">${milestone.description}</p>

${fileUrl && milestone.fileType==='image'?`<img src="${fileUrl}" class="milestone-image" alt="${milestone.title}">`:''}

</div>

</div>

`;

}).join('');

}

catch(err){

console.error('Error loading milestones:', err);
timeline.innerHTML='<div style="text-align:center; padding:50px; color:#ff6b00;">Error loading milestones. Please try again later.</div>';

}

}

function openModal(item){
const modal=document.getElementById('milestoneModal');
const fileUrl=item.fileUrl?`${BASE_URL}${item.fileUrl}`:'';

const modalImage=document.getElementById('modalImage');
if(fileUrl && item.fileType==='image'){
modalImage.src=fileUrl;
modalImage.style.display='block';
} else {
modalImage.style.display='none';
}

document.getElementById('modalTitle').textContent=item.title;

const modalDate=document.getElementById('modalDate');
if(item.date){
modalDate.textContent=item.date;
modalDate.style.display='block';
} else {
modalDate.style.display='none';
}

document.getElementById('modalDescription').textContent=item.description;

const modalLink=document.getElementById('modalLink');
if(item.link){
modalLink.href=item.link;
modalLink.style.display='inline-block';
modalLink.textContent='View Details';
}else{
modalLink.style.display='none';
}

modal.style.display='flex';
document.body.style.overflow='hidden';
}

function closeModal(){
document.getElementById('milestoneModal').style.display='none';
document.body.style.overflow='auto';
}

// Close modal on escape key
document.addEventListener('keydown', function(e) {
if(e.key === 'Escape') {
closeModal();
}
});

// Close modal when clicking outside
document.getElementById('milestoneModal').addEventListener('click', function(e) {
if(e.target === this) {
closeModal();
}
});

document.addEventListener('DOMContentLoaded',loadMilestones);

</script>

</body>
</html>
