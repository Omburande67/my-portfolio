<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Om Burande</title>
    <link rel="stylesheet" href="/css/projects.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1c;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #12192b;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff944d;
        }

        .main-container {
            width: 100%;
            min-height: 100vh;
            background: #0a0f1c;
            padding: 20px 30px;
            position: relative;
        }

        /* Animated Background */
        .main-container::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header Section with Back Button */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 122, 0, 0.1);
            border: 1px solid rgba(255, 122, 0, 0.3);
            color: #ff7a00;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .github-header {
            text-align: center;
            flex: 1;
            animation: fadeInDown 0.8s ease;
        }

        .github-header h1 {
            color: #f8f7f6;
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 122, 0, 0.3);
            position: relative;
            display: inline-block;
        }

        .github-header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff7a00, transparent);
            animation: widthPulse 2s infinite;
        }

        .github-header .subtitle {
            color: #a0a0a0;
            font-size: 16px;
            margin-top: 15px;
        }

        /* Profile Section */
        .profile-section {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .profile-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            flex: 1;
            min-width: 300px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInLeft 0.8s ease;
        }

        .profile-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ff7a00;
            box-shadow: 0 20px 40px rgba(255, 122, 0, 0.3);
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #ff7a00;
            object-fit: cover;
            transition: all 0.5s ease;
            animation: pulseGlow 2s infinite;
        }

        .profile-card:hover .profile-avatar {
            transform: scale(1.05);
            border-color: #ff944d;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px solid rgba(255, 122, 0, 0.3);
            animation: rotate 10s linear infinite;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .username-row .name {
            color: #ff7a00;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7a00, #ffa64d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username-row .handle {
            color: #888;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            margin: 20px 0;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 5px;
            border-radius: 12px;
            border: 1px solid rgba(255, 122, 0, 0.2);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-color: #ff7a00;
            transform: translateY(-3px);
        }

        .stat-value {
            color: #ff7a00;
            font-size: 22px;
            font-weight: 700;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 12px;
        }

        .joined {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .github-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff7a00, #ff944d);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .github-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .github-link:hover::before {
            left: 100%;
        }

        .github-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 122, 0, 0.4);
        }

        /* Commits Card */
        .commits-card {
            flex: 1.3;
            min-width: 400px;
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideInRight 0.8s ease;
        }

        .commits-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .commits-card h3 {
            color: #ff7a00;
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .commits-card h3::before {
            content: '📊';
            font-size: 24px;
        }

        /* Subtle Explore Link */
        .explore-link-subtle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ff7a00;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 122, 0, 0.05);
            transition: all 0.3s ease;
        }

        .explore-link-subtle:hover {
            background: rgba(255, 122, 0, 0.15);
            transform: translateX(3px);
            text-shadow: 0 0 8px rgba(255, 122, 0, 0.5);
        }

        .explore-link-subtle span {
            transition: transform 0.3s ease;
        }

        .explore-link-subtle:hover span {
            transform: translateX(4px);
        }

        .chart-container {
            width: 100%;
            height: 280px;
            position: relative;
            margin-top: 10px;
        }

        /* Stats Cards */
        .stats-grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: #ff7a00;
            box-shadow: 0 20px 30px rgba(255, 122, 0, 0.2);
        }

        .stat-card h3 {
            color: #ff7a00;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 122, 0, 0.3);
        }

        .language-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .language-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-name {
            width: 60px;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
        }

        .progress-container {
            flex: 1;
            height: 8px;
            background: #1e2a3a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff7a00, #ffa64d);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .lang-percent {
            width: 45px;
            color: #ff7a00;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
        }

        /* Contribution Graph */
        .contribution-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .contribution-card h3 {
            color: #ff7a00;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contribution-card h3::before {
            content: '📈';
            font-size: 24px;
        }

        .contribution-graph {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .contribution-graph:hover {
            transform: scale(1.02);
        }

        /* Rate Limit */
        .rate-limit {
            text-align: right;
            color: #888;
            font-size: 14px;
            margin: 20px 0;
            padding: 12px 20px;
            background: rgba(18, 25, 43, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            border: 1px solid rgba(255, 122, 0, 0.2);
            animation: fadeIn 1s ease 0.6s both;
        }

        .rate-limit span {
            color: #ff7a00;
            font-weight: 600;
        }

        /* Projects Section */
        .projects-section {
            margin-top: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .projects-title {
            text-align: center;
            color: #ff7a00;
            font-size: 36px;
            margin-bottom: 25px;
            font-weight: 700;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .projects-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff7a00, transparent);
        }

        .project-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #search, #filter {
            padding: 12px 20px;
            background: rgba(30, 42, 58, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid #ff7a00;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            min-width: 250px;
            outline: none;
            transition: all 0.3s ease;
        }

        #search:focus, #filter:focus {
            border-color: #ff944d;
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
            transform: scale(1.02);
        }

        #filter {
            cursor: pointer;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: rgba(18, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 122, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInScale 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255, 122, 0, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .repo-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ff7a00;
            box-shadow: 0 20px 30px rgba(255, 122, 0, 0.2);
        }

        .repo-card:hover::before {
            opacity: 1;
        }

        .repo-name {
            color: #ff7a00;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .repo-description {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .repo-meta {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 122, 0, 0.1);
            border-bottom: 1px solid rgba(255, 122, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .repo-link {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ff7a00, #ff944d);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .repo-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .repo-link:hover::before {
            left: 100%;
        }

        .repo-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 50px;
            color: #ff7a00;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 122, 0, 0.3);
            border-top-color: #ff7a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 122, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 122, 0, 0.6);
            }
        }

        @keyframes widthPulse {
            0%, 100% { width: 80px; opacity: 0.5; }
            50% { width: 120px; opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container { padding: 15px; }
            .github-header h1 { font-size: 36px; }
            .stats-grid-container { grid-template-columns: 1fr; }
            .commits-card { min-width: 100%; }
            .header-wrapper { flex-direction: column; }
            .back-home-btn { align-self: flex-start; }
            .commits-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header with Back Button -->
        <div class="header-wrapper">
            <a href="/index.html" class="back-home-btn">← Back to Home</a>
            <div class="github-header">
                <h1>GITHUB ACTIVITY</h1>
                <div class="subtitle">Please do scroll for Recent Projects</div>
            </div>
            <div style="width: 100px;"></div> <!-- Spacer for alignment -->
        </div>

        <!-- Profile Section -->
        <div class="profile-section">
            <div class="profile-card">
                <div class="avatar-wrapper">
                    <img id="avatar" class="profile-avatar" src="" alt="Profile Avatar">
                </div>
                <div class="username-row">
                    <span class="name" id="fullName">Loading...</span>
                    <span class="handle" id="username"></span>
                </div>
                               
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="repoCount">0</div>
                        <div class="stat-label">Repos</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="followerCount">0</div>
                        <div class="stat-label">Followers</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="followingCount">0</div>
                        <div class="stat-label">Following</div>
                    </div>
                </div>

                <div class="joined" id="joined"></div>
                <a id="githubLink" class="github-link" href="#" target="_blank">View GitHub Profile →</a>
            </div>

            <!-- Commits Chart with Explore Link Below -->
            <div class="commits-card">
                <div class="commits-header">
                    <h3>Commit Activity</h3>
                    <a href="https://profile-summary-for-github.com/user/Omburande67" target="_blank" class="explore-link-subtle">
                        Explore My GitHub Analytics <span>→</span>
                    </a>
                </div>
                <div class="chart-container">
                    <canvas id="commitChart"></canvas>
                </div>
            </div>
        </div> 

        <!-- Language Stats Cards -->
        <div class="stats-grid-container" id="languageStats">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Contribution Graph -->
        <div class="contribution-card">
            <h3>Contribution Graph</h3>
            <img id="contributionGraph" class="contribution-graph" src="" alt="Contribution Graph">
        </div>

        <!-- Rate Limit -->
        <div class="rate-limit" id="rateLimit">
            Loading rate limit...
        </div>

        <!-- Projects Section -->
        <section class="projects-section">
            <h2 class="projects-title">My Projects</h2>

            <div class="project-controls">
                <input type="text" id="search" placeholder="🔍 Search projects...">
                <select id="filter">
                    <option value="recent">📅 Recent Projects</option>
                    <option value="stars">⭐ Starred</option>
                    <option value="Java">☕ Java</option>
                    <option value="C++">⚡ C++</option>
                    <option value="HTML">🌐 HTML</option>
                    <option value="CSS">🎨 CSS</option>
                </select>
            </div>

            <div id="repoContainer" class="repo-grid"></div>
        </section>
    </div>
    
    <script src="/js/github.js"></script>
    <script src="/js/config.js"></script>
    
</body>
</html>
