<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milestones</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#0a0a0a;
color:#ffffff;
min-height:100vh;
}

/* Animated Background */

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%, rgba(255,107,0,0.15) 0%, transparent 45%),
radial-gradient(circle at 70% 60%, rgba(255,107,0,0.15) 0%, transparent 45%);
pointer-events:none;
z-index:-1;
}

.page-section{
max-width:1200px;
margin:0 auto;
padding:40px 20px 40px;
}

/* Back button */

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:12px 24px;
background:rgba(255,107,0,0.1);
border:1px solid rgba(255,107,0,0.3);
color:#ff6b00;
text-decoration:none;
border-radius:8px;
font-weight:500;
margin-bottom:35px;
transition:0.3s;
}

.back-btn:hover{
background:#ff6b00;
color:#0a0a0a;
transform:translateX(-5px);
}

/* Header */

.header{
text-align:center;
margin-bottom:45px;
}

.page-title{
font-size:48px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#b0b0b0;
font-size:18px;
}

/* Timeline */

.timeline{
position:relative;
padding:10px 0;
}

.timeline::before{
content:'';
position:absolute;
left:50%;
transform:translateX(-50%);
width:4px;
height:100%;
background:linear-gradient(180deg,#ff6b00,#ff8c00,transparent);
border-radius:2px;
}

/* Timeline Item */

.timeline-item{
position:relative;
margin-bottom:40px; /* REDUCED GAP */
width:100%;
display:flex;
justify-content:center;
}

/* Badge */

.timeline-badge{
position:absolute;
left:50%;
transform:translateX(-50%);
width:60px; /* reduced */
height:60px;
background:linear-gradient(135deg,#ff6b00,#ff8c00);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
z-index:2;
box-shadow:0 0 20px rgba(255,107,0,0.5);
}

/* Card */

.timeline-content{
width:45%;
background:rgba(20,20,20,0.95);
border-radius:18px;
padding:22px; /* reduced padding */
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,107,0,0.2);
}

.timeline-content:hover{
transform:scale(1.03);
border-color:#ff6b00;
}

.timeline-item:nth-child(odd) .timeline-content{
margin-right:auto;
}

.timeline-item:nth-child(even) .timeline-content{
margin-left:auto;
}

/* Card text */

.milestone-title{
font-size:22px;
font-weight:600;
margin-bottom:8px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.milestone-date{
color:#ff6b00;
font-weight:500;
margin-bottom:10px;
}

.milestone-desc{
color:#a0a0a0;
line-height:1.5;
margin-bottom:12px; /* reduced */
}

/* Image */

.milestone-image{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:8px;
margin-top:10px; /* reduced */
border:2px solid rgba(255,107,0,0.3);
}

/* Modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:1000;
justify-content:center;
align-items:center;
}

.modal-content{
background:#1a1a1a;
max-width:800px;
width:90%;
border-radius:20px;
padding:35px;
border:1px solid rgba(255,107,0,0.3);
}

.close-modal{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
color:#999;
}

.modal-image{
width:100%;
max-height:380px;
object-fit:contain;
margin-bottom:20px;
}

.modal-title{
font-size:30px;
margin-bottom:10px;
background:linear-gradient(135deg,#ffffff,#ff6b00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.modal-description{
color:#a0a0a0;
line-height:1.7;
margin-bottom:25px;
}

.modal-link{
display:inline-block;
padding:14px 28px;
background:linear-gradient(135deg,#ff6b00,#ff8c00);
color:#0a0a0a;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

</style>
</head>

<body>

<section class="page-section">

<a href="achievements.html" class="back-btn">← Back to Achievements</a>

<div class="header">
<h1 class="page-title">Milestones</h1>
<p class="subtitle">Key achievements and career highlights</p>
</div>

<div class="timeline" id="milestonesTimeline"></div>

</section>

<!-- Modal -->

<div id="milestoneModal" class="modal">

<div class="modal-content">

<span class="close-modal" onclick="closeModal()">&times;</span>

<img id="modalImage" class="modal-image">

<h2 id="modalTitle" class="modal-title"></h2>

<p id="modalDate"></p>

<p id="modalDescription" class="modal-description"></p>

<a id="modalLink" class="modal-link" target="_blank">View Details</a>

</div>
</div>
 <script src="/js/config.js"></script>
<script>

const API_BASE=`${BASE_URL}/api`;

async function loadMilestones(){

const timeline=document.getElementById('milestonesTimeline');

timeline.innerHTML='Loading...';

try{

const response=await fetch(`${API_BASE}/achievements/category/milestone`);

const milestones=await response.json();

milestones.sort((a,b)=>new Date(b.date)-new Date(a.date));

timeline.innerHTML=milestones.map((milestone,index)=>{

const fileUrl=milestone.fileUrl?`${BASE_URL}${milestone.fileUrl}`:'';

const icons=['🥇','🥈','🥉','🎯','⭐','✨'];

const icon=icons[index]||'🎯';

return`

<div class="timeline-item">

<div class="timeline-badge">${icon}</div>

<div class="timeline-content" onclick='openModal(${JSON.stringify(milestone).replace(/'/g,"\\'")})'>

<h3 class="milestone-title">${milestone.title}</h3>

<div class="milestone-date">${milestone.date||'Date not specified'}</div>

<p class="milestone-desc">${milestone.description}</p>

${fileUrl && milestone.fileType==='image'?`<img src="${fileUrl}" class="milestone-image">`:''}

</div>

</div>

`;

}).join('');

}

catch(err){

timeline.innerHTML='Error loading milestones';

}

}

function openModal(item){

const modal=document.getElementById('milestoneModal');

const fileUrl=item.fileUrl?`${BASE_URL}${item.fileUrl}`:'';

document.getElementById('modalImage').src=fileUrl;

document.getElementById('modalTitle').textContent=item.title;

document.getElementById('modalDate').textContent=item.date;

document.getElementById('modalDescription').textContent=item.description;

const modalLink=document.getElementById('modalLink');

if(item.link){

modalLink.href=item.link;

modalLink.style.display='inline-block';

}else{

modalLink.style.display='none';

}

modal.style.display='flex';

}

function closeModal(){

document.getElementById('milestoneModal').style.display='none';

}

document.addEventListener('DOMContentLoaded',loadMilestones);

</script>

</body>
</html>
