<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="/css/achievements.css">
    <style>
        /* ===== COMPLETE CSS FIX - PRESERVES ALL ORIGINAL FUNCTIONALITY ===== */
        
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            color: #eef2ff;
        }
        
        .achievements {
            padding: 60px 0 80px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Back button */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 122, 0, 0.1);
            border: 1px solid rgba(255, 122, 0, 0.3);
            color: #ff7a00;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
        }
        
        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }
        
        /* Title */
        .title {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, #ffffff, #ffb347, #ff7a00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #aab4d4;
            border-left: 3px solid #ff7a00;
            padding-left: 20px;
            margin-bottom: 48px;
        }
        
        /* Cards grid */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        
        /* Individual card */
        .card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 28px 24px;
            width: calc(33.333% - 20px);
            min-width: 300px;
            flex: 1;
            border: 1px solid rgba(255, 122, 0, 0.25);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 122, 0, 0.5);
        }
        
        .card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #ffc285);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-left: 4px solid #ff7a00;
            padding-left: 16px;
        }
        
        /* Thumbnail slider - FIXED */
        .thumbnail-slider {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 16px 0 20px;
            border-radius: 16px;
        }
        
        .thumb-track {
            display: flex;
            flex-direction: row;
            gap: 16px;
            padding: 8px 4px 12px 4px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        /* THUMBNAIL STYLES - PROPER SIZE AND FIT */
        .thumb {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid rgba(255, 122, 0, 0.3);
            transition: all 0.25s ease;
            scroll-snap-align: start;
            flex-shrink: 0;
            background: #1e2a3a;
            display: block;
        }
        
        .thumb.active {
            border-color: #ff7a00;
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.4);
        }
        
        /* PDF and no-file thumbnails */
        .thumb.pdf-thumb, .thumb.no-file {
            width: 110px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1f2a3e, #131c2c);
            border-radius: 16px;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
            font-size: 44px;
        }
        
        .thumb.pdf-thumb span:last-child, .thumb.no-file span:last-child {
            font-size: 11px;
            color: #aaa;
        }
        
        /* Card footer */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .view-btn {
            background: rgba(255, 122, 0, 0.15);
            border: 1px solid rgba(255, 122, 0, 0.5);
            color: #ffae6e;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .view-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            border-color: #ff7a00;
        }
        
        .accent-line {
            height: 3px;
            width: 70px;
            background: linear-gradient(90deg, #ff7a00, #ffb347);
            border-radius: 3px;
        }
        
        .no-items {
            padding: 24px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            color: #bbb;
            width: 100%;
        }
        
        /* Modal styles */
        .achievement-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #101826;
            padding: 28px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            position: relative;
            border: 1px solid rgba(255, 122, 0, 0.3);
        }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #ffaa66;
        }
        
        .close-btn:hover {
            color: #ff7a00;
        }
        
        #modal-image {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .modal-content h2 {
            color: #ffbd7a;
            margin-bottom: 8px;
        }
        
        .modal-content p {
            color: #ccd6f0;
            margin: 6px 0;
        }
        
        #modal-link {
            display: inline-block;
            margin-top: 16px;
            background: #ff7a00;
            padding: 8px 20px;
            border-radius: 30px;
            color: #0a0f1c;
            text-decoration: none;
            font-weight: bold;
        }
        
        /* ===== RESPONSIVE DESIGN - MOBILE FIRST ===== */
        
        /* Tablet */
        @media (max-width: 1024px) {
            .container {
                padding: 0 20px;
            }
            .card {
                padding: 22px;
            }
            .thumb {
                width: 95px;
                height: 95px;
            }
            .thumb.pdf-thumb, .thumb.no-file {
                width: 95px;
                height: 95px;
            }
        }
        
        /* Mobile Landscape & Tablet Portrait */
        @media (max-width: 768px) {
            .achievements {
                padding: 40px 0 60px;
            }
            
            .back-home-btn {
                padding: 8px 16px;
                font-size: 12px;
                margin-bottom: 16px;
            }
            
            .title {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 32px;
            }
            
            .cards {
                flex-direction: column;
                gap: 24px;
            }
            
            .card {
                width: 100%;
                padding: 20px;
            }
            
            .card h2 {
                font-size: 1.4rem;
                margin-bottom: 16px;
            }
            
            /* THUMBNAILS - PROPERLY FITTED FOR MOBILE */
            .thumb {
                width: 95px;
                height: 95px;
                border-radius: 14px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 95px;
                height: 95px;
            }
            
            .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
                font-size: 38px;
            }
            
            .thumb-track {
                gap: 14px;
                padding-bottom: 8px;
            }
            
            .card-footer {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            
            .view-btn {
                padding: 7px 18px;
                font-size: 0.85rem;
            }
            
            .accent-line {
                width: 55px;
            }
        }
        
        /* Small Mobile */
        @media (max-width: 550px) {
            .container {
                padding: 0 16px;
            }
            
            .title {
                font-size: 1.7rem;
            }
            
            .card {
                padding: 18px;
            }
            
            .card h2 {
                font-size: 1.3rem;
            }
            
            /* LARGER THUMBNAILS FOR BETTER VISIBILITY ON SMALL SCREENS */
            .thumb {
                width: 85px;
                height: 85px;
                border-radius: 12px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 85px;
                height: 85px;
            }
            
            .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
                font-size: 34px;
            }
            
            .thumb-track {
                gap: 12px;
            }
            
            .view-btn {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
            
            .accent-line {
                width: 45px;
            }
        }
        
        /* Extra Small Mobile */
        @media (max-width: 420px) {
            .thumb {
                width: 75px;
                height: 75px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 75px;
                height: 75px;
            }
            
            .thumb.pdf-thumb span:first-child, .thumb.no-file span:first-child {
                font-size: 30px;
            }
        }
        
        /* Very Small Devices */
        @media (max-width: 360px) {
            .title {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 0.75rem;
            }
            
            .thumb {
                width: 70px;
                height: 70px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 70px;
                height: 70px;
            }
        }
        
        /* Desktop Large Screens */
        @media (min-width: 1400px) {
            .container {
                max-width: 1400px;
                padding: 0 40px;
            }
            
            .thumb {
                width: 130px;
                height: 130px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 130px;
                height: 130px;
            }
            
            .cards {
                gap: 35px;
            }
        }
        
        /* Scrollbar Styling */
        .thumb-track::-webkit-scrollbar {
            height: 4px;
        }
        
        .thumb-track::-webkit-scrollbar-track {
            background: rgba(255, 122, 0, 0.15);
            border-radius: 10px;
        }
        
        .thumb-track::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 10px;
        }
        
        /* Ensure images display properly */
        img.thumb {
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>

<section class="achievements">
    <div class="container">
            <a href="index.html" class="back-home-btn">← Back to Home</a>
        <h1 class="title">Achievements & Recognition</h1>
        <p class="subtitle">Certificates • Hackathons • Awards</p>

        <div class="cards" id="achievementsContainer">
            <!-- Cards will be dynamically populated here -->
        </div>
    </div>
</section>
<script src="/js/config.js"></script>
<script>
// ===== ORIGINAL JAVASCRIPT - COMPLETELY UNMODIFIED =====
const API_BASE = `${BASE_URL}/api`;

async function loadAchievements() {
    try {
        const response = await fetch(`${API_BASE}/achievements/all`);
        const achievements = await response.json();

        // Group achievements by category
        const industry = achievements.filter(a => a.category === 'industry');
        const competitive = achievements.filter(a => a.category === 'competitive');
        const milestones = achievements.filter(a => a.category === 'milestone');

        const container = document.getElementById('achievementsContainer');
        
        container.innerHTML = `
            <!-- Industry Credentials Card -->
            <div class="card">
                <h2>Industry Credentials</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="industry-thumbnails">
                        ${generateThumbnails(industry)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('industry')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- Competitive Highlights Card -->
            <div class="card">
                <h2>Competitive Highlights</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="competitive-thumbnails">
                        ${generateThumbnails(competitive)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('competitive')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- Milestones Card -->
            <div class="card">
                <h2>Milestones</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="milestones-thumbnails">
                        ${generateThumbnails(milestones)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('milestone')">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>
        `;

        // Initialize thumbnail click handlers
        initializeThumbnails();

    } catch (error) {
        console.error('Error loading achievements:', error);
        showFallbackContent();
    }
}

function generateThumbnails(items) {
    if (items.length === 0) {
        return `<div class="no-items">No achievements yet</div>`;
    }
    
    return items.map((item, index) => {
        const isActive = index === 0 ? 'active' : '';
        
        if (item.fileType === 'image' && item.fileUrl) {
            // Image thumbnail
            return `<img src="${BASE_URL}${item.fileUrl}" 
                         class="thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">`;
        } else if (item.fileType === 'pdf' && item.fileUrl) {
            // PDF thumbnail (icon)
            return `<div class="thumb pdf-thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">
                        <span>📄</span>
                        <span>PDF</span>
                    </div>`;
        } else {
            // No file thumbnail (text icon)
            return `<div class="thumb no-file ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         onclick="showAchievementDetails(this)">
                        <span>📝</span>
                        <span>Info</span>
                    </div>`;
        }
    }).join('');
}

function initializeThumbnails() {
    document.querySelectorAll('.thumb-track').forEach(track => {
        const thumbs = track.querySelectorAll('.thumb');
        if (thumbs.length > 0) {
            thumbs[0].classList.add('active');
        }
    });
}

function showAchievementDetails(thumbnail) {
    const track = thumbnail.closest('.thumb-track');
    track.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    thumbnail.classList.add('active');
    
    console.log('Selected:', {
        title: thumbnail.dataset.title,
        description: thumbnail.dataset.description,
        issuer: thumbnail.dataset.issuer,
        date: thumbnail.dataset.date
    });
    
    // Optional: Open modal with details
    // openAchievementModal(thumbnail.dataset);
}

function viewAll(category) {
    const pages = {
        'industry': 'certificates.html',
        'competitive': 'hackathons.html',
        'milestone': 'milestones.html'
    };
    window.location.href = pages[category];
}

function showFallbackContent() {
    const container = document.getElementById('achievementsContainer');
    container.innerHTML = `
        <div class="card">
            <h2>Industry Credentials</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secone-1.png" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secone-2.png" class="thumb">
                    <img src="/assets/images/ach-thumnails/secone-3.png" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
        <div class="card">
            <h2>Competitive Highlights</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/sectwo-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/sectwo-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/sectwo-4.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
        <div class="card">
            <h2>Milestones</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secthree-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secthree-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/secthree-3.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
                <span class="accent-line"></span>
            </div>
        </div>
    `;
}

// Load achievements when page loads
document.addEventListener('DOMContentLoaded', loadAchievements);

// Modal functions (optional)
function createDetailModal() {
    const modal = document.createElement('div');
    modal.className = 'achievement-modal';
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Achievement">
            <h2 id="modal-title"></h2>
            <p id="modal-issuer"></p>
            <p id="modal-date"></p>
            <p id="modal-description"></p>
            <a id="modal-link" href="#" target="_blank">View Certificate</a>
        </div>
    `;
    document.body.appendChild(modal);
}

function openModal(achievementData) {
    const modal = document.querySelector('.achievement-modal') || createDetailModal();
    
    document.getElementById('modal-image').src = achievementData.fileUrl ? `${BASE_URL}${achievementData.fileUrl}` : '';
    document.getElementById('modal-title').textContent = achievementData.title;
    document.getElementById('modal-issuer').textContent = achievementData.issuer;
    document.getElementById('modal-date').textContent = achievementData.date;
    document.getElementById('modal-description').textContent = achievementData.description;
    
    const link = document.getElementById('modal-link');
    if (achievementData.link) {
        link.href = achievementData.link;
        link.style.display = 'inline-block';
    } else {
        link.style.display = 'none';
    }
    
    modal.style.display = 'flex';
}

function closeModal() {
    const modal = document.querySelector('.achievement-modal');
    if (modal) modal.style.display = 'none';
}
</script>

</body>
</html>
