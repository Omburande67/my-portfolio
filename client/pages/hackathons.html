<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Highlights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 107, 0, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 107, 0, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .page-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.3);
            color: #ff6b00;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #ff6b00;
            color: #0a0a0a;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .page-title {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 16px;
            position: relative;
            display: inline-block;
            padding-bottom: 12px;
        }

        .subtitle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: #ff6b00;
            border-radius: 2px;
        }

        .competitive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .comp-card {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .comp-card:hover {
            transform: translateY(-8px);
            border-color: #ff6b00;
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.25);
        }

        .comp-image {
            height: 180px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
        }

        .comp-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .comp-card:hover .comp-image img {
            transform: scale(1.08);
        }

        .comp-image .no-image {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .comp-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .comp-title {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .comp-date {
            color: #b0b0b0;
            font-size: 13px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .comp-date::before {
            content: '📅';
            font-size: 12px;
            color: #ff6b00;
        }

        .comp-description {
            color: #a0a0a0;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            flex: 1;
        }

        .comp-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 107, 0, 0.2);
            margin-top: auto;
        }

        .comp-badge {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255, 107, 0, 0.15);
            border: 1px solid rgba(255, 107, 0, 0.4);
            border-radius: 20px;
            font-size: 12px;
            color: #ff6b00;
        }

        .view-btn {
            color: #ff6b00;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: gap 0.3s ease;
        }

        .view-btn:hover {
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #ff6b00;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid rgba(255, 107, 0, 0.3);
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 16px;
            border: 1px solid rgba(255, 107, 0, 0.2);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #b0b0b0;
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1a1a1a;
            max-width: 800px;
            width: 90%;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            border: 1px solid rgba(255, 107, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 107, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-modal:hover {
            color: #ff6b00;
            background: rgba(255, 107, 0, 0.2);
            transform: rotate(90deg);
        }

        .modal-image {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid rgba(255, 107, 0, 0.3);
        }

        .modal-title {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .modal-date {
            color: #b0b0b0;
            margin-bottom: 20px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-date::before {
            content: '📅';
            color: #ff6b00;
        }

        .modal-description {
            color: #a0a0a0;
            line-height: 1.8;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .modal-link {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff6b00, #ff8c00);
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border: none;
        }

        .modal-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3);
        }
    </style>
</head>
<body>
    <section class="page-section">
        <a href="achievements.html" class="back-btn">← Back to Achievements</a>
        
        <div class="header">
            <h1 class="page-title">COMPETITIVE HIGHLIGHTS</h1>
            <p class="subtitle">Hackathons, competitions, and coding challenges</p>
        </div>

        <div id="competitiveGrid" class="competitive-grid"></div>
    </section>

    <!-- Modal -->
    <div id="compModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImage" class="modal-image" src="" alt="Achievement">
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalDate" class="modal-date"></p>
            <p id="modalDescription" class="modal-description"></p>
            <a id="modalLink" class="modal-link" href="#" target="_blank">View Details</a>
        </div>
    </div>
     <script src="/js/config.js"></script>
    <script>
        const API_BASE = `${BASE_URL}/api`;

        async function loadCompetitive() {
            const grid = document.getElementById('competitiveGrid');
            grid.innerHTML = '<div class="loading">Loading achievements</div>';

            try {
                const response = await fetch(`${API_BASE}/achievements/category/competitive`);
                const achievements = await response.json();

                if (achievements.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🏆</div>
                            <h3>No Achievements Yet</h3>
                            <p>Check back later for competition highlights</p>
                            <a href="achievements.html" class="back-btn" style="display: inline-block;">← Back</a>
                        </div>
                    `;
                    return;
                }

                achievements.sort((a, b) => {
                    if (!a.date) return 1;
                    if (!b.date) return -1;
                    return new Date(b.date) - new Date(a.date);
                });

                grid.innerHTML = achievements.map(comp => {
                    const fileUrl = comp.fileUrl ? `${BASE_URL}${comp.fileUrl}` : null;
                    const hasImage = comp.fileType === 'image' && fileUrl;
                    
                    return `
                        <div class="comp-card" onclick='openModal(${JSON.stringify(comp).replace(/'/g, "\\'")})'>
                            <div class="comp-image">
                                ${hasImage ? 
                                    `<img src="${fileUrl}" alt="${comp.title}">` : 
                                    `<div class="no-image">📄 ${comp.fileType === 'pdf' ? 'PDF Document' : 'No Image'}</div>`
                                }
                            </div>
                            <div class="comp-content">
                                <h3 class="comp-title">${comp.title}</h3>
                                <div class="comp-date">${comp.date || 'Date not specified'}</div>
                                <p class="comp-description">${comp.description}</p>
                                <div class="comp-footer">
                                    <span class="comp-badge">Competition</span>
                                    <span class="view-btn">View Details →</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="empty-state">⚠️ Error loading achievements</div>`;
            }
        }

        function openModal(item) {
            const modal = document.getElementById('compModal');
            const fileUrl = item.fileUrl ? `${BASE_URL}${item.fileUrl}` : '';
            
            document.getElementById('modalImage').src = fileUrl;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDate').textContent = item.date || 'Date not specified';
            document.getElementById('modalDescription').textContent = item.description;
            
            const modalLink = document.getElementById('modalLink');
            if (item.link) {
                modalLink.href = item.link;
                modalLink.style.display = 'inline-block';
            } else {
                modalLink.style.display = 'none';
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('compModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('compModal');
            if (event.target === modal) closeModal();
        }

        document.addEventListener('DOMContentLoaded', loadCompetitive);
    </script>
</body>
</html>
