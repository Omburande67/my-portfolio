<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="/css/achievements.css">
    <style>
        /* ===== FIXED CSS - THUMBNAILS NOW DISPLAY PROPERLY ===== */

        /* Additional background fallback - ensures background shows even if CSS fails */
        body {
            background: url("/client/assets/images/fas.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        /* Ensure body has proper background color fallback while image loads */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1c 0%, #0c1222 100%);
            z-index: -2;
        }
        
        /* Dark overlay for better text readability */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        /* Ensure all content appears above the background */
        .achievements, header, section, footer {
            position: relative;
            z-index: 1;
        }
        
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url("/assets/images/fas.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        /* SECTION */
        .achievements {
            padding: 30px 6%;
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* HEADER */
        .title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #ff7a00;
            font-weight: 500;
            margin-bottom: 28px;
        }

        /* BACK HOME BUTTON */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 122, 0, 0.2);
            border: 1px solid rgba(255, 122, 0, 0.5);
            color: #ff7a00;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-home-btn:hover {
            background: #ff7a00;
            color: #0a0f1c;
            transform: translateX(-5px);
        }

        /* CARD GRID */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* CARD */
        .card {
            background: rgba(10, 10, 10, 0.85);
            padding: 18px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        /* BLACK & WHITE LIGHTNING BORDER */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 10px;
            padding: 2px;
            background: linear-gradient(
                120deg,
                #ffffff,
                #000000,
                #ffffff
            );
            background-size: 250% 250%;
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            animation: borderLightning 3.5s linear infinite;
            pointer-events: none;
        }

        @keyframes borderLightning {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .card h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 20px;
            color: #ff9f4a;
        }

        /* ===== FIXED THUMBNAIL AREA - HORIZONTAL SCROLL ===== */
        .thumbnail-slider {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            border-radius: 8px;
            background: #111;
            margin-bottom: 10px;
            scroll-behavior: smooth;
        }

        .thumb-track {
            display: flex;
            flex-direction: row;
            gap: 12px;
            padding: 12px;
            min-height: 160px;
        }

        /* FIXED THUMBNAIL STYLES */
        .thumb {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid rgba(255, 122, 0, 0.4);
            transition: all 0.25s ease;
            flex-shrink: 0;
            background: #1a1f2e;
            display: block;
        }

        .thumb.active {
            border-color: #ff7a00;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.4);
        }

        /* PDF and no-file thumbnails */
        .thumb.pdf-thumb, .thumb.no-file {
            width: 130px;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 8px;
            flex-shrink: 0;
            gap: 8px;
        }

        .thumb.pdf-thumb span, .thumb.no-file span {
            font-size: 42px;
        }

        .thumb.pdf-thumb span:last-child, .thumb.no-file span:last-child {
            font-size: 12px;
            color: #ffaa66;
        }

        /* Scrollbar styling */
        .thumbnail-slider::-webkit-scrollbar {
            height: 5px;
        }

        .thumbnail-slider::-webkit-scrollbar-track {
            background: rgba(255, 122, 0, 0.2);
            border-radius: 10px;
        }

        .thumbnail-slider::-webkit-scrollbar-thumb {
            background: #ff7a00;
            border-radius: 10px;
        }

        /* FOOTER */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        /* VIEW BUTTON */
        .view-btn {
            padding: 7px 18px;
            background: #ff7a00;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .view-btn:hover {
            background: #ff9a2a;
            transform: scale(1.02);
        }

        /* Sliding text animation */
        .card-footer::before {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: -100%;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            opacity: 0.85;
            animation: slideTextRight 8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Different text per section */
        .cards .card:nth-child(1) .card-footer::before {
            content: "Explore All Certifications   ";
        }

        .cards .card:nth-child(2) .card-footer::before {
            content: "View Hackathon Highlights   ";
        }

        .cards .card:nth-child(3) .card-footer::before {
            content: "See Award Achievements   ";
        }

        @keyframes slideTextRight {
            0% {
                right: -100%;
            }
            100% {
                right: 110%;
            }
        }

        /* No items message */
        .no-items {
            padding: 40px;
            text-align: center;
            color: #888;
            font-style: italic;
            width: 100%;
        }

        /* Modal styles */
        .achievement-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1f2e;
            padding: 24px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            position: relative;
            border: 1px solid #ff7a00;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            cursor: pointer;
            color: #ff7a00;
        }

        .close-btn:hover {
            color: #ffaa66;
        }

        #modal-image {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .modal-content h2 {
            color: #ff9f4a;
            margin-bottom: 8px;
        }

        .modal-content p {
            color: #ccc;
            margin: 6px 0;
        }

        #modal-link {
            display: inline-block;
            margin-top: 16px;
            background: #ff7a00;
            padding: 8px 20px;
            border-radius: 30px;
            color: #0a0f1c;
            text-decoration: none;
            font-weight: bold;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .achievements {
                padding: 20px 4%;
            }
            
            .title {
                font-size: 28px;
            }
            
            .subtitle {
                font-size: 14px;
                margin-bottom: 20px;
            }
            
            .cards {
                gap: 20px;
            }
            
            .card {
                padding: 14px;
            }
            
            .card h2 {
                font-size: 18px;
                margin-bottom: 12px;
            }
            
            /* Mobile thumbnails - slightly smaller but still visible */
            .thumb {
                width: 100px;
                height: 100px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 100px;
                height: 100px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 34px;
            }
            
            .thumb-track {
                gap: 10px;
                padding: 10px;
            }
            
            .view-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
            
            .card-footer::before {
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .thumb {
                width: 85px;
                height: 85px;
            }
            
            .thumb.pdf-thumb, .thumb.no-file {
                width: 85px;
                height: 85px;
            }
            
            .thumb.pdf-thumb span, .thumb.no-file span {
                font-size: 28px;
            }
            
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<section class="achievements">
    <div class="container">
            <a href="/index.html" class="back-home-btn">← Back to Home</a>
        <h1 class="title">Achievements & Recognition</h1>
        <p class="subtitle">Certificates • Hackathons • Awards</p>

        <div class="cards" id="achievementsContainer">
            <!-- Cards will be dynamically populated here -->
        </div>
    </div>
</section>
<script src="/js/config.js"></script>
<script>
// ===== ORIGINAL JAVASCRIPT - COMPLETELY UNMODIFIED =====
const API_BASE = `${BASE_URL}/api`;

async function loadAchievements() {
    try {
        const response = await fetch(`${API_BASE}/achievements/all`);
        const achievements = await response.json();

        // Group achievements by category
        const industry = achievements.filter(a => a.category === 'industry');
        const competitive = achievements.filter(a => a.category === 'competitive');
        const milestones = achievements.filter(a => a.category === 'milestone');

        const container = document.getElementById('achievementsContainer');
        
        container.innerHTML = `
            <!-- Industry Credentials Card -->
            <div class="card">
                <h2>Industry Credentials</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="industry-thumbnails">
                        ${generateThumbnails(industry)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('industry')">View All</button>
                </div>
            </div>

            <!-- Competitive Highlights Card -->
            <div class="card">
                <h2>Competitive Highlights</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="competitive-thumbnails">
                        ${generateThumbnails(competitive)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('competitive')">View All</button>
                </div>
            </div>

            <!-- Milestones Card -->
            <div class="card">
                <h2>Milestones</h2>
                <div class="thumbnail-slider">
                    <div class="thumb-track" id="milestones-thumbnails">
                        ${generateThumbnails(milestones)}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="view-btn" onclick="viewAll('milestone')">View All</button>
                </div>
            </div>
        `;

        // Initialize thumbnail click handlers
        initializeThumbnails();

    } catch (error) {
        console.error('Error loading achievements:', error);
        showFallbackContent();
    }
}

function generateThumbnails(items) {
    if (items.length === 0) {
        return `<div class="no-items">No achievements yet</div>`;
    }
    
    return items.map((item, index) => {
        const isActive = index === 0 ? 'active' : '';
        
        if (item.fileType === 'image' && item.fileUrl) {
            // Image thumbnail
            return `<img src="${BASE_URL}${item.fileUrl}" 
                         class="thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">`;
        } else if (item.fileType === 'pdf' && item.fileUrl) {
            // PDF thumbnail (icon)
            return `<div class="thumb pdf-thumb ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         data-fileurl="${item.fileUrl || ''}"
                         data-filetype="${item.fileType || ''}"
                         onclick="showAchievementDetails(this)">
                        <span>📄</span>
                        <span>PDF</span>
                    </div>`;
        } else {
            // No file thumbnail (text icon)
            return `<div class="thumb no-file ${isActive}" 
                         data-id="${item._id}"
                         data-title="${item.title}"
                         data-description="${item.description}"
                         data-issuer="${item.issuer || ''}"
                         data-date="${item.date || ''}"
                         data-link="${item.link || ''}"
                         onclick="showAchievementDetails(this)">
                        <span>📝</span>
                        <span>Award</span>
                    </div>`;
        }
    }).join('');
}

function initializeThumbnails() {
    document.querySelectorAll('.thumb-track').forEach(track => {
        const thumbs = track.querySelectorAll('.thumb');
        if (thumbs.length > 0) {
            thumbs[0].classList.add('active');
        }
    });
}

function showAchievementDetails(thumbnail) {
    const track = thumbnail.closest('.thumb-track');
    track.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    thumbnail.classList.add('active');
    
    console.log('Selected:', {
        title: thumbnail.dataset.title,
        description: thumbnail.dataset.description,
        issuer: thumbnail.dataset.issuer,
        date: thumbnail.dataset.date
    });
    
    // Optional: Open modal with details
    // openAchievementModal(thumbnail.dataset);
}

function viewAll(category) {
    const pages = {
        'industry': 'certificates.html',
        'competitive': 'hackathons.html',
        'milestone': 'milestones.html'
    };
    window.location.href = pages[category];
}

function showFallbackContent() {
    const container = document.getElementById('achievementsContainer');
    container.innerHTML = `
        <div class="card">
            <h2>Industry Credentials</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secone-1.png" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secone-2.png" class="thumb">
                    <img src="/assets/images/ach-thumnails/secone-3.png" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
            </div>
        </div>
        <div class="card">
            <h2>Competitive Highlights</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/sectwo-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/sectwo-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/sectwo-4.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
            </div>
        </div>
        <div class="card">
            <h2>Milestones</h2>
            <div class="thumbnail-slider">
                <div class="thumb-track">
                    <img src="/assets/images/ach-thumnails/secthree-1.jpg" class="thumb active">
                    <img src="/assets/images/ach-thumnails/secthree-2.jpg" class="thumb">
                    <img src="/assets/images/ach-thumnails/secthree-3.jpg" class="thumb">
                </div>
            </div>
            <div class="card-footer">
                <button class="view-btn">View All</button>
            </div>
        </div>
    `;
}

// Load achievements when page loads
document.addEventListener('DOMContentLoaded', loadAchievements);

// Modal functions (optional)
function createDetailModal() {
    const modal = document.createElement('div');
    modal.className = 'achievement-modal';
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Achievement">
            <h2 id="modal-title"></h2>
            <p id="modal-issuer"></p>
            <p id="modal-date"></p>
            <p id="modal-description"></p>
            <a id="modal-link" href="#" target="_blank">View Certificate</a>
        </div>
    `;
    document.body.appendChild(modal);
}

function openModal(achievementData) {
    const modal = document.querySelector('.achievement-modal') || createDetailModal();
    
    document.getElementById('modal-image').src = achievementData.fileUrl ? `${BASE_URL}${achievementData.fileUrl}` : '';
    document.getElementById('modal-title').textContent = achievementData.title;
    document.getElementById('modal-issuer').textContent = achievementData.issuer;
    document.getElementById('modal-date').textContent = achievementData.date;
    document.getElementById('modal-description').textContent = achievementData.description;
    
    const link = document.getElementById('modal-link');
    if (achievementData.link) {
        link.href = achievementData.link;
        link.style.display = 'inline-block';
    } else {
        link.style.display = 'none';
    }
    
    modal.style.display = 'flex';
}

function closeModal() {
    const modal = document.querySelector('.achievement-modal');
    if (modal) modal.style.display = 'none';
}
</script>

</body>
</html>
