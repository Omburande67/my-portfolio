<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/client/css/achievements.css">
</head>
<body>

<section class="achievements">

    <div class="container">

        <h1 class="title">Achievements & Recognition</h1>
        <p class="subtitle">Certificates • Hackathons • Awards</p>

        <div class="cards">

            <!-- CERTIFICATES -->
            <div class="card">
                <h2>Industry Credentials</h2>

                <div class="thumbnail-slider">
                    <div class="thumb-track">
                        <img src="/client/assets/images/ach-thumnails/secone-1.png" class="thumb active">
                        <img src="/client/assets/images/ach-thumnails/secone-2.png" class="thumb">
                        <img src="/client/assets/images/ach-thumnails/secone-3.png" class="thumb">
                    </div>
                </div>

                <div class="card-footer">
                    <button class="view-btn">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- HACKATHONS -->
            <div class="card">
                <h2>Competitive Highlights</h2>

                <div class="thumbnail-slider">
                    <div class="thumb-track">
                        <img src="/client/assets/images/ach-thumnails/sectwo-1.jpg" class="thumb active">
                        <img src="/client/assets/images/ach-thumnails/sectwo-2.jpg" class="thumb">
                        <img src="/client/assets/images/ach-thumnails/sectwo-4.jpg" class="thumb">
                    </div>
                </div>

                <div class="card-footer">
                    <button class="view-btn">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

            <!-- AWARDS -->
            <div class="card">
                <h2>Milestones</h2>

                <div class="thumbnail-slider">
                    <div class="thumb-track">
                        <img src="/client/assets/images/ach-thumnails/secthree-1.jpg" class="thumb active">
                        <img src="/client/assets/images/ach-thumnails/secthree-2.jpg" class="thumb">
                        <img src="/client/assets/images/ach-thumnails/secthree-3.jpg" class="thumb">
                    </div>
                </div>

                <div class="card-footer">
                    <button class="view-btn">View All</button>
                    <span class="accent-line"></span>
                </div>
            </div>

        </div>
    </div>

</section>

<script src="/client/js/achievements.js"></script>
</body>
</html>
